<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabota Roll</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@tonejs/midi"></script>
<!-- shared interpreter: exposes window.TabotaResolve.resolve() (same module index.html imports) -->
<script type="module" src="../tabota-resolve.js"></script>
<style>
:root{
  /* Light, fully hued — no achromatic axis. Pale tide-pool ground. */
  --paper:        #eaf1ec;  /* app ground, high-L green-cyan */
  --note-bg:      #e3ebe6;  /* canvas area (set on canvas via JS too) */
  --panel:        #f1ecf4;  /* toolbars, low-chroma plum (different hue) */
  --panel-2:      #e7dfee;  /* raised */
  --edge:         #cdbcd6;  /* hued violet border */
  --edge-2:       #b9cfc7;  /* hued teal border */
  --ink:          #18302b;  /* text, dark teal (not black) */
  --ink-dim:      #5a6f68;  /* dim, hued */
  --ink-faint:    #8a9b93;
  --algae:        #5d8c00;  /* hold / point  (chartreuse, deepened for light) */
  --algae-soft:   #d6e8a8;
  --magenta:      #d1336b;  /* glide / line */
  --magenta-soft: #f3c9d8;
  --violet:       #6a47d8;  /* freehand / curve */
  --violet-soft:  #d8cef5;
  --tide:         #11897e;  /* structure / links / scale labels */
  --ember:        #dd6b12;  /* selection / playhead / warnings */
  --ember-soft:   #f7d9bf;
  --mono: "IBM Plex Mono","SFMono-Regular",Menlo,monospace;
  --display: "Fraunces",Georgia,serif;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0; font-family:var(--mono); color:var(--ink);
  background:
    radial-gradient(120% 80% at 0% 0%, #eef4ef 0%, var(--paper) 55%),
    var(--paper);
  display:flex; flex-direction:column; height:100vh; height:100dvh; overflow:hidden;
  -webkit-font-smoothing:antialiased;
}
header{
  display:flex; align-items:baseline; gap:14px; padding:9px 16px 8px;
  border-bottom:1px solid var(--edge);
  background:linear-gradient(180deg,var(--panel),var(--panel-2));
}
header .brand{font-family:var(--display); font-weight:600; font-size:20px; letter-spacing:.2px; font-optical-sizing:auto;}
header .brand em{font-style:italic; color:var(--tide)}
header .sub{font-size:11px; color:var(--ink-dim); letter-spacing:.04em}
header .spacer{flex:1}
header .pill{
  font-size:11px; padding:3px 9px; border-radius:999px; border:1px solid var(--edge-2);
  background:#fff8; color:var(--ink-dim);
}
header .pill b{color:var(--tide); font-weight:600}
header .pill input{width:38px; background:transparent; border:none; border-bottom:1px dashed var(--edge-2);
  color:var(--tide); font:inherit; font-weight:600; text-align:center; padding:0; outline:none;}
header .pill input:focus{border-bottom-color:var(--tide)}

/* toolbar */
.toolbar{
  display:flex; flex-wrap:wrap; align-items:center; gap:6px 10px;
  padding:7px 14px; border-bottom:1px solid var(--edge);
  background:var(--panel); font-size:12px;
}
.group{display:flex; align-items:center; gap:5px; padding:2px 8px 2px 0;}
.group + .group{border-left:1px solid var(--edge); padding-left:10px}
.group > label{color:var(--ink-dim); font-size:11px; letter-spacing:.02em}
button.tool, .seg button, .btn{
  font-family:var(--mono); font-size:12px; color:var(--ink);
  background:#fbfafe; border:1px solid var(--edge); border-radius:7px;
  padding:5px 9px; cursor:pointer; line-height:1; transition:.12s;
}
button.tool:hover,.btn:hover{background:#fff; border-color:var(--tide)}
button.tool.active{
  background:var(--ink); color:var(--paper); border-color:var(--ink);
}
.seg{display:inline-flex; border:1px solid var(--edge); border-radius:8px; overflow:hidden; background:#fbfafe}
.seg button{border:none; border-radius:0; border-right:1px solid var(--edge)}
.seg button:last-child{border-right:none}
.seg button.on{background:var(--tide); color:#fff}
.seg.regime button.on{background:var(--violet)}
input[type=number],select,input[type=text]{
  font-family:var(--mono); font-size:12px; color:var(--ink);
  background:#fff; border:1px solid var(--edge); border-radius:6px;
  padding:4px 6px; width:62px;
}
select{width:auto}
input[type=number].w48{width:48px}
.chk{display:inline-flex; align-items:center; gap:5px; cursor:pointer; user-select:none; color:var(--ink-dim)}
.chk input{accent-color:var(--tide)}
.legend{display:flex; gap:12px; align-items:center; font-size:11px; color:var(--ink-dim)}
.legend i{display:inline-block; width:18px; height:0; border-top-width:4px; border-top-style:solid; vertical-align:middle; margin-right:5px; border-radius:2px}
.legend .hold{border-top-color:var(--algae)}
.legend .glide{border-top-color:var(--magenta)}
.legend .free{border-top-color:var(--violet)}

/* stage */
.rbar{display:flex; align-items:center; gap:8px; padding:6px 12px; font-size:12px; color:var(--ink-dim,#5a6f68);}
.rbar-k{font-size:9.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-dim,#8a9b93);}
#scrub{display:block; width:100%; height:22px; cursor:ew-resize; touch-action:none; background:var(--panel);}
#activeRegionName{color:var(--tide,#11897e); font-weight:600;}
.rtabs{display:flex; gap:4px; align-items:flex-end; padding:8px 10px 0; flex-wrap:wrap;}
.rtab{font-family:var(--mono,monospace); font-size:11.5px; background:var(--panel,#e7dfee); border:1px solid var(--line,#cdbcd6); border-bottom:none; color:var(--ink-dim,#5a6f68); padding:5px 10px; border-radius:5px 5px 0 0; cursor:pointer; display:inline-flex; align-items:center; gap:7px; line-height:1.2;}
.rtab:hover{color:var(--ink,#18302b);}
.rtab.on{background:var(--note-bg,#e3ebe6); color:var(--tide,#11897e); border-color:var(--tide,#11897e); font-weight:600;}
.rtab em{font-style:normal; font-size:9.5px; letter-spacing:.04em; color:var(--ink-dim,#8a9b93); opacity:.85;}
.rtab .rtab-x{font-size:13px; line-height:1; opacity:.45; margin-left:1px;}
.rtab .rtab-x:hover{opacity:1; color:var(--ember,#dd6b12);}
.rtab.rtab-add{color:var(--tide,#11897e); font-weight:700; padding:5px 11px;}
.stage{position:relative; flex:1; min-height:0; overflow:hidden; background:var(--note-bg)}
#roll{display:block; width:100%; height:100%; cursor:crosshair; touch-action:none}
.stage.tool-select #roll{cursor:default}
.stage.tool-point #roll{cursor:crosshair}
.stage.tool-erase #roll{cursor:not-allowed}
.stage.tool-pan #roll{cursor:grab}

/* footer / status + io */
footer{
  display:flex; align-items:center; gap:14px; flex-wrap:wrap;
  padding:6px 14px; border-top:1px solid var(--edge);
  background:linear-gradient(0deg,var(--panel),var(--panel-2)); font-size:11.5px; color:var(--ink-dim);
}
footer .spacer{flex:1}
footer code{font-family:var(--mono); color:var(--ink)}
.warn{color:var(--ember)}
.transport button{font-size:13px; padding:6px 12px}
.transport .play.on{background:var(--algae); border-color:var(--algae); color:#13260a}

/* mobile / narrow screens: let the whole page scroll and give the canvas a fixed, usable height
   so toolbars and the footer are always reachable (they were being clipped by overflow:hidden). */
@media (max-width: 860px){
  body{ height:auto; min-height:100dvh; overflow-y:auto; -webkit-overflow-scrolling:touch; }
  .stage{ flex:0 0 auto; height:58vh; height:58dvh; min-height:340px; }
  .toolbar{ padding:6px 10px; gap:5px 8px; }
  .group{ padding:1px 6px 1px 0; }
  .group + .group{ padding-left:8px; }
  header{ padding:8px 12px 7px; }
  header .sub{ display:none; }
  footer{ padding:8px 12px 14px; }
}

/* drawer (report / io detail) */
.drawer{
  position:absolute; right:0; top:0; bottom:0; width:360px; max-width:86vw;
  background:linear-gradient(180deg,#fbf9fd,var(--panel));
  border-left:1px solid var(--edge); transform:translateX(100%); transition:transform .22s ease;
  display:flex; flex-direction:column; z-index:20; box-shadow:-12px 0 40px -28px #2a1a3a55;
}
.drawer.open{transform:none}
.drawer h3{font-family:var(--display); font-weight:600; margin:0; padding:12px 14px 8px; font-size:15px}
.drawer .close{position:absolute; top:10px; right:12px; cursor:pointer; color:var(--ink-dim); background:none; border:none; font-size:16px}
.drawer .body{overflow:auto; padding:0 14px 16px; font-size:11.5px}
.drawer table{border-collapse:collapse; width:100%; font-size:10.5px}
.drawer th,.drawer td{text-align:right; padding:3px 5px; border-bottom:1px solid var(--edge)}
.drawer th{color:var(--ink-dim); position:sticky; top:0; background:var(--panel); font-weight:500}
.drawer td.l,.drawer th.l{text-align:left}
.bendbar{display:inline-block; height:7px; background:var(--tide); border-radius:2px; vertical-align:middle}
.flag{color:var(--ember); font-weight:600}
.summary{background:#fff8; border:1px solid var(--edge-2); border-radius:8px; padding:9px 11px; margin:10px 0; line-height:1.5}
.hint{color:var(--ink-faint); font-size:10.5px; line-height:1.5; margin-top:10px}
.kbd{font-family:var(--mono); background:#fff; border:1px solid var(--edge); border-bottom-width:2px; border-radius:4px; padding:0 5px; font-size:10.5px}

/* tempo track — docked translucent overlay over the lower roll (never reflows notes) */
#tempoPanel{
  position:absolute; left:0; right:0; bottom:0; z-index:15;
  --tempoH:120px;
  display:flex; flex-direction:column;
  background:linear-gradient(180deg, #f1ecf4d9, #e7dfeeea);
  border-top:1px solid var(--edge);
  box-shadow:0 -14px 40px -30px #2a1a3a66;
  backdrop-filter:blur(2px); -webkit-backdrop-filter:blur(2px);
  user-select:none; touch-action:none;
}
#tempoHead{
  display:flex; align-items:center; gap:8px; height:19px; padding:0 8px 0 0;
  position:relative; cursor:default;
  border-bottom:1px solid transparent;
}
#tempoPanel:not(.tcollapsed) #tempoHead{ border-bottom-color:var(--edge); }
#tempoGrip{
  flex:0 0 auto; align-self:stretch; width:26px; cursor:ns-resize;
  background:
    repeating-linear-gradient(90deg, var(--edge) 0 2px, transparent 2px 5px) center/16px 2px no-repeat;
  opacity:.7;
}
#tempoPanel.tcollapsed #tempoGrip{ cursor:default; opacity:.35; }
#tempoToggle{
  flex:0 0 auto; font-family:var(--mono); font-size:11px; letter-spacing:.02em;
  background:none; border:none; color:var(--tide); font-weight:600;
  cursor:pointer; padding:2px 4px; line-height:1;
}
#tempoToggle:hover{ color:var(--ink); }
#tempoReadout{
  flex:1 1 auto; min-width:0; font-size:10.5px; color:var(--ink-dim);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.tspacer{ flex:1 1 auto; }
.tbtn{
  flex:0 0 auto; font-family:var(--mono); font-size:10.5px;
  background:#fff8; border:1px solid var(--edge); border-radius:4px;
  color:var(--ink-dim); cursor:pointer; padding:1px 7px; line-height:1.5;
}
.tbtn:hover:not(:disabled){ background:#fff; border-color:var(--tide); color:var(--ink); }
.tbtn:disabled{ opacity:.4; cursor:default; }
#tempoEdit{ flex:1 1 auto; min-width:0; display:none; align-items:center; gap:5px;
  font-size:10.5px; color:var(--ink-dim); white-space:nowrap; overflow:hidden; }
#tempoEdit .te-lab{ color:var(--tide); font-weight:600; flex:0 0 auto; }
#tempoEdit .te-arrow{ color:var(--ink-faint); flex:0 0 auto; }
#tempoEdit > span{ flex:0 0 auto; display:inline-flex; align-items:center; gap:4px; }
.te-sel,.te-num{ font-family:var(--mono); font-size:10.5px; color:var(--ink);
  background:#fff8; border:1px solid var(--edge); border-radius:4px; padding:1px 3px; line-height:1.4; }
.te-sel:hover,.te-num:hover{ border-color:var(--tide); }
.te-num{ width:50px; text-align:right; }
.te-sel:focus,.te-num:focus{ outline:none; border-color:var(--tide); }
#tempo{
  display:block; width:100%; height:var(--tempoH);
  cursor:crosshair; touch-action:none; background:transparent;
}
/* make the tempo BPM number field sit inside the 19px tempo bar */
#teBpm.te-num{
  height:17px;
  min-height:0;
  line-height:15px;
  padding:0 3px;
  margin:0;
  vertical-align:middle;
}

/* Firefox: prevent number input chrome from adding extra height */
#teBpm{
  appearance:textfield;
  -moz-appearance:textfield;
}

/* Chromium/Safari: keep steppers compact instead of inflating the bar */
#teBpm::-webkit-inner-spin-button,
#teBpm::-webkit-outer-spin-button{
  margin:0;
  height:15px;
}
#tempoPanel.tcollapsed #tempo{ display:none; }
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-thumb{background:var(--edge); border-radius:6px; border:2px solid var(--panel)}
::-webkit-scrollbar-track{background:transparent}

input[type=number], select, input[type=text]{
  transition:border-color .12s, background .12s, box-shadow .12s;
}

input[type=number]:hover,
select:hover,
input[type=text]:hover{
  border-color:var(--tide);
  background:#fff;
}

input[type=number]:focus,
select:focus,
input[type=text]:focus{
  outline:none;
  border-color:var(--tide);
  box-shadow:0 0 0 2px #11897e22;
}

input[type=number]:disabled,
input[type=text]:disabled,
select:disabled{
  opacity:.55;
  cursor:not-allowed;
}

/* native ^ v number steppers — Chromium/Safari */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{
  opacity:.72;
  cursor:ns-resize;
  filter:saturate(1.25) hue-rotate(120deg);
}

input[type=number]:hover::-webkit-inner-spin-button,
input[type=number]:hover::-webkit-outer-spin-button{
  opacity:1;
}

/* dropdown caret polish */
select{
  cursor:pointer;
}

select:disabled{
  cursor:not-allowed;
}

</style>
</head>
<body>
<header>
  <div class="brand">Tabota <em>Roll</em></div>
  <div class="sub">polytemporal multi-tuning graphical score editor</div>
  <div class="spacer"></div>
  <div class="pill" title="MIDI translation only — how far one channel's pitch-bend may reach. Tabota's curves and slides are unconstrained; this sets what the .mid shadow can carry before hard-walling.">bend ± <input type="number" id="bendRange" value="2" min="1" max="48" step="1"> st</div>
  <div class="pill" id="pillRegime">meter · scale</div>
</header>

<div class="toolbar">
  <div class="group seg" id="tools">
    <button data-tool="select" title="Select / move / resize whole notes — object level (V)">▣ select</button>
    <button data-tool="point" title="Point tool — select/move points; click a curve body to add (drag to place, release to commit); double-click a point to delete (A)">⋯ point</button>
    <button data-tool="hold" class="on" title="Hold note — point type (H)">━ hold</button>
    <button data-tool="glide" title="Glide — drag start→end (G)">╱ glide</button>
    <button data-tool="pen" title="Pen — click to place points, double-click/Enter to finish (P)">✎ pen</button>
    <button data-tool="free" title="Freehand contour (F)">∿ free</button>
    <button data-tool="erase" title="Erase (E)">⌫ erase</button>
    <button data-tool="slice" title="Slice — click to cut at that spot; the band picks the axis: time, pitch, or region (= both). Box doesn't slice. (S)">⌿ slice</button>
    <button data-tool="pan" title="Pan (space-drag)">✋ pan</button>
  </div>
  <div class="group">
    <label>select</label>
    <div class="seg" id="selModeSeg">
      <button data-m="replace" class="on" title="Replace — a click or marquee starts a fresh selection">replace</button>
      <button data-m="include" title="Include — clicks &amp; marquees add to the selection (or hold Shift)">＋ incl</button>
      <button data-m="exclude" title="Exclude — clicks &amp; marquees remove from the selection (or hold Alt)">− excl</button>
    </div>
  </div>

  <div class="group">
    <label>band</label>
    <div class="seg" id="selBandSeg">
      <button data-b="box" class="on" title="Box — free rectangular marquee">▢ box</button>
      <button data-b="vertical" title="Time band — sweep horizontally to select a span of time across all pitches">▮ time</button>
      <button data-b="horizontal" title="Pitch band — sweep vertically to select a register across all time">▬ pitch</button>
      <button data-b="region" title="Region band — click or sweep to select everything in whole region(s); with the slice tool it cuts time+pitch">田 region</button>
    </div>
  </div>

  <div class="group">
    <label>curve</label>
    <select id="curveSel" title="glide curve shape — applies to new glides and any selected glide segment/note">
      <option value="">—</option>
      <option value="linear">╱ linear</option>
      <option value="exp">⌒ exp (ease-in)</option>
      <option value="log">⌐ log (ease-out)</option>
      <option value="smooth">∫ smooth (S)</option>
    </select>
  </div>

  <div class="group" id="pointGroup">
    <label>point</label>
    <input type="number" id="ptHz" class="w48" step="0.01" min="1" title="exact frequency of the selected point (Hz)" disabled style="width:78px">
    <span style="color:var(--ink-dim)">Hz</span>
    <input type="text" id="ptNote" title="note name of the selected point, e.g. A4, C#5, Bb3, A4+12 (cents)" placeholder="–" disabled style="width:72px">
  </div>

  <div class="group">
    <label>region · time</label>
    <div class="seg regime" id="timeRegime">
      <button data-r="meter" class="on">meter</button>
      <button data-r="time">time</button>
    </div>
    <select id="cycleSel" title="active cycle — a tuning of time; defines the metric grid &amp; snap (not the stored beats). One cycle = one bar; calibrate its span with the sig / =♩"></select>
    <input type="number" id="cycDepth" class="w48" value="3" min="1" max="7" title="subdivision depth — how deep grammar cycles generate their grid &amp; snap (ignored by flat cycles)">
    <button class="tool" id="loadCyc" title="load .cyc / .txt meter file(s)">⤓ .cyc</button>
    <input type="file" id="cycFile" accept=".cyc,.txt,text/plain" multiple style="display:none">
    <span id="timeCalib" style="display:inline-flex;align-items:center;gap:5px">
      <label>♩=</label><input type="number" id="bpm" value="120" min="20" max="400" step="1" title="tempo — quarter notes per minute, the host clock the denominator scales against">
      <label>sig</label><input type="number" id="sigNum" class="w48" value="4" min="0.25" max="64" step="any" title="beats per bar (fractional welcome — 5/8 ≡ 2.5/4)"> /
      <input type="number" id="sigDen" class="w48" value="4" min="0.5" max="64" step="any" title="the bar's counting unit, as a note value — 8 counts eighths; non-standard values (8.4…) welcome, the grid is denominator-agnostic">
      <label title="the same setting, generalized: the bar's span in quarter-durations of the ♩= clock. 5/8 reads 2.5; editing it rewrites the numerator">=</label><input type="number" id="sigSpan" class="w48" step="any" min="0.0625" title="bar span in ♩ — the host parameter the sig notates; edit either view">
      <span style="color:var(--ink-dim)">♩</span>
      <button class="tool" id="sigGhost" title="">⌗</button>
    </span>
  </div>
  <div class="group">
    <label>region · pitch</label>
    <div class="seg regime" id="pitchRegime">
      <button data-r="scale" class="on">scale</button>
      <button data-r="freq">freq·Hz</button>
    </div>
    <select id="scaleSel" title="active scale — defines the pitch ruler & snap targets (not the stored pitch or MIDI export)"></select>
    <select id="scaleRoot" title="anchor the scale's 1/1 to this note"></select>
    <button class="tool" id="loadScl" title="load .scl file(s)">⤓ .scl</button>
    <input type="file" id="sclFile" accept=".scl" multiple style="display:none">
    <label>A4</label><input type="number" id="a4" value="440" min="380" max="500" step="0.1" title="pitch calibration — the A4 reference the scale's lattice hangs from (the time panel's ♩= twin)">
  </div>

  <div class="group">
    <label class="chk"><input type="checkbox" id="snapTime" checked> snap&nbsp;time</label>
    <select id="grid" title="grid resolution">
<option value="1">𝅝</option>
  <option value="2">𝅗𝅥</option>
  <option value="4">♩</option>
  <option value="8">♪</option>
  <option value="16" selected>𝅘𝅥𝅯</option>
  <option value="3">𝅗𝅥³</option>
  <option value="6">♩³</option>
  <option value="32">𝅘𝅥𝅰</option>
  <option value="12">♪³</option>
    </select>
    <label class="chk"><input type="checkbox" id="snapPitch" checked> snap&nbsp;pitch</label>
  </div>

  <div class="group">
    <button class="tool" id="zxIn" title="zoom in time">↔＋</button>
    <button class="tool" id="zxOut">↔－</button>
    <button class="tool" id="zyIn" title="zoom in pitch">↕＋</button>
    <button class="tool" id="zyOut">↕－</button>
    <button class="tool" id="zFit" title="fit content">fit</button>
  </div>

  <div class="group" id="clipGroup">
    <label>clip</label>
    <button class="tool" id="cutBtn" title="cut selection (⌘/Ctrl+X)">✂</button>
    <button class="tool" id="copyBtn" title="copy selection (⌘/Ctrl+C)">⧉</button>
    <button class="tool" id="pasteBtn" title="paste at cursor (⌘/Ctrl+V)">⎘</button>
    <button class="tool" id="joinBtn" title="join selected notes into one glide (J)">⌒ join</button>
    <button class="tool" id="splitBtn" title="split note(s) at selected interior point(s); a whole multi-point note explodes into segments (K)">⌣ split</button>
  </div>

  <div class="group" id="voiceGroup">
    <label>voice</label>

<script>
/* ============================================================
   TABOTA MICROTONAL ENGINE  (validated against @tonejs/midi)
   pure functions — note/freq math, tuning, pitch bend, SMF writer
   ============================================================ */
const PITCH_CLASS={'C':0,'C#':1,'DB':1,'D':2,'D#':3,'EB':3,'E':4,'F':5,'F#':6,'GB':6,'G':7,'G#':8,'AB':8,'A':9,'A#':10,'BB':10,'B':11};
const NOTE_NAMES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
function noteNameToMidi(name){
  const m=String(name).trim().match(/^([A-Ga-g])([#b]?)(-?\d+)$/);
  if(!m) return null;
  const pc=PITCH_CLASS[m[1].toUpperCase()+(m[2]==='b'?'B':m[2])];
  if(pc===undefined) return null;
  return (parseInt(m[3],10)+1)*12+pc;
}
function midiToName(midi){ return NOTE_NAMES[((midi%12)+12)%12]+(Math.floor(midi/12)-1); }
function midiToFreq(midi,a4=440){ return a4*Math.pow(2,(midi-69)/12); }
function freqToMidi(freq,a4=440){ return 69+12*Math.log2(freq/a4); }
function freqToBend(freq,range,a4=440){
  const mFloat=freqToMidi(freq,a4);
  const baseNote=Math.round(mFloat);
  const deltaSemis=mFloat-baseNote;
  let pb=Math.round(8192+(deltaSemis/range)*8192);
  pb=Math.max(0,Math.min(16383,pb));
  return {baseNote,deltaSemis,deltaCents:deltaSemis*100,pb14:pb};
}
function bendForTargetMidi(targetMidi,baseNote,range){
  const deltaSemis=targetMidi-baseNote;
  let pb=Math.round(8192+(deltaSemis/range)*8192);
  const clamped=Math.max(0,Math.min(16383,pb));
  return {pb14:clamped,deltaSemis,overflow:pb!==clamped};
}
class MidiWriter{
  constructor(ppq=480){ this.ppq=ppq; this.events=[]; this._seq=0; }
  _push(tick,bytes,order=0){ this.events.push({tick:Math.round(tick),order,seq:this._seq++,bytes}); }
  tempo(tick,bpm){ const m=Math.round(60000000/bpm); this._push(tick,[0xFF,0x51,0x03,(m>>16)&255,(m>>8)&255,m&255],-100); }
  timeSignature(tick,num,den){ this._push(tick,[0xFF,0x58,0x04,num,Math.round(Math.log2(den)),24,8],-99); }
  trackName(tick,name){ const b=[].slice.call(new TextEncoder().encode(name)); this._push(tick,[0xFF,0x03,b.length,...b],-98); }
  programChange(tick,ch,p){ this._push(tick,[0xC0|(ch&15),p&127],-50); }
  cc(tick,ch,c,v,order=-40){ this._push(tick,[0xB0|(ch&15),c&127,v&127],order); }
  setBendRange(tick,ch,semis,cents=0){
    this.cc(tick,ch,101,0,-60); this.cc(tick,ch,100,0,-59);
    this.cc(tick,ch,6,semis&127,-58); this.cc(tick,ch,38,cents&127,-57);
    this.cc(tick,ch,101,127,-56); this.cc(tick,ch,100,127,-55);
  }
  pitchBend(tick,ch,v14){ const v=Math.max(0,Math.min(16383,Math.round(v14))); this._push(tick,[0xE0|(ch&15),v&127,(v>>7)&127],-10); }
  noteOn(tick,ch,note,vel=100){ this._push(tick,[0x90|(ch&15),note&127,vel&127],0); }
  noteOff(tick,ch,note){ this._push(tick,[0x80|(ch&15),note&127,0],-5); }
  _vlq(value){ let buf=value&127; const out=[]; while(value>>=7){ buf<<=8; buf|=((value&127)|128); } while(true){ out.push(buf&255); if(buf&128) buf>>=8; else break; } return out; }
  build(){
    this.events.sort((a,b)=>a.tick-b.tick||a.order-b.order||a.seq-b.seq);
    const trk=[]; let last=0;
    for(const e of this.events){ trk.push(...this._vlq(e.tick-last),...e.bytes); last=e.tick; }
    trk.push(0x00,0xFF,0x2F,0x00);
    const ppq=this.ppq;
    const head=[0x4D,0x54,0x68,0x64,0,0,0,6,0,0,0,1,(ppq>>8)&255,ppq&255];
    const len=trk.length;
    const th=[0x4D,0x54,0x72,0x6B,(len>>24)&255,(len>>16)&255,(len>>8)&255,len&255];
    return new Uint8Array([...head,...th,...trk]);
  }
}

/* ============================================================
   NOTE MODEL  (canonical: time in BEATS, pitch in Hz)
   note = {id, start(beats), dur(beats), type, vel, pts:[{t(0..1), hz}]}
     hold  -> pts length 1  (flat)
     glide -> pts length 2  (linear start->end)
     free  -> pts length N  (contour)
   ============================================================ */
let NID=1;
function shapeK(k,curve){          // remap 0..1 interpolation parameter
  if(k<=0) return 0; if(k>=1) return 1;
  switch(curve){
    case 'exp':    return k*k;             // ease-in: slow start, fast finish
    case 'log':    return 1-(1-k)*(1-k);   // ease-out: fast start, slow finish
    case 'smooth': return k*k*(3-2*k);     // S-curve, eased both ends
    default:       return k;               // linear
  }
}
function pitchAt(note,frac){            // hz at normalized position 0..1
  const p=note.pts;
  if(p.length===1) return p[0].hz;
  if(frac<=p[0].t) return p[0].hz;
  if(frac>=p[p.length-1].t) return p[p.length-1].hz;
  for(let i=0;i<p.length-1;i++){
    if(frac>=p[i].t && frac<=p[i+1].t){
      const span=(p[i+1].t-p[i].t)||1e-9;
      let k=(frac-p[i].t)/span;
      if(note.type==='glide') k=shapeK(k, p[i].curve || note.curve || 'linear');   // per-segment curve
      // interpolate in log-frequency (linear in cents) for musical glides
      const m0=Math.log2(p[i].hz), m1=Math.log2(p[i+1].hz);
      return Math.pow(2, m0+(m1-m0)*k);
    }
  }
  return p[p.length-1].hz;
}
function noteMinMaxHz(note){
  let lo=Infinity,hi=-Infinity;
  for(const q of note.pts){ if(q.hz<lo)lo=q.hz; if(q.hz>hi)hi=q.hz; }
  return [lo,hi];
}

/* ---------- MIDI export (pure, testable) ----------
   Polyphony is carried by VOICES. Each voice maps to its own MIDI channel
   so it gets an independent pitch-bend stream (simultaneous microtonal voices
   can't share one channel). Within a voice the line is monophonic: overlaps
   resolve by voice-stealing (each note's end is clipped to the next onset).
   Bends beyond the user's range hard-wall (clamp) — a translation formality. */
function buildMidi(notes, opts){
  const {ppq=480,bpm=120,sigNum=4,sigDen=4,a4=440,range=2,baseChannel=0,program=0,vel=96,bendSteps=24,
         timeline=null,qAtSec=null,secAtQ=null}=opts;
  // seconds <-> quarters: piecewise through the region timeline when given, single-tempo otherwise
  const s2q = qAtSec || (s=>s*bpm/60);
  const q2s = secAtQ || (q=>q*60/bpm);
  const w=new MidiWriter(ppq);
  w.trackName(0,'Tabota Roll');
  if(timeline && timeline.length){
    let pb=null,pn=null,pd=null;
    for(const g of timeline){ const tk=g.q*ppq;
      if(g.bpm!==pb){ w.tempo(tk,g.bpm); pb=g.bpm; }
      if(g.sigNum!==pn||g.sigDen!==pd){ w.timeSignature(tk,g.sigNum,g.sigDen); pn=g.sigNum; pd=g.sigDen; }
    }
  } else { w.tempo(0,bpm); w.timeSignature(0,sigNum,sigDen); }
  // group notes by voice
  const byVoice=new Map();
  for(const n of notes){ const v=n.voice||1; if(!byVoice.has(v)) byVoice.set(v,[]); byVoice.get(v).push(n); }
  const voices=[...byVoice.keys()].sort((a,b)=>a-b);
  const report=[]; const warnings=[]; const channelsUsed=[];
  voices.forEach((v,vi)=>{
    const ch=(baseChannel+vi)%16;
    channelsUsed.push({voice:v,ch:ch+1});
    w.programChange(0,ch,program);
    w.setBendRange(0,ch,range,0);
    const ns=byVoice.get(v).slice().sort((a,b)=>a.start-b.start);
    // mono voice-stealing within the voice: clip each end to next onset
    for(let i=0;i<ns.length;i++){
      ns[i]._end = (i<ns.length-1)? Math.min(ns[i].start+ns[i].dur, ns[i+1].start) : ns[i].start+ns[i].dur;
    }
    for(const n of ns){
      const startBeat=n.start, endBeat=Math.max(n.start+0.0001,n._end);
      const durBeat=endBeat-startBeat;
      const startTick=startBeat*ppq, endTick=endBeat*ppq;
      // contour fractions are measured against the FULL note span in seconds, so a stolen note's
      // glide truncates at its drawn rate; ticks come back through the timeline so curves keep
      // honest seconds even when a note crosses a tempo boundary
      const sSec=q2s(startBeat), cutSec=q2s(endBeat);
      const fullSec=Math.max(q2s(n.start+Math.max(n.dur,1e-4))-sSec, 1e-6);
      const startHz=pitchAt(n,0);
      const base=Math.round(freqToMidi(startHz,a4));      // nearest 12-TET key to onset
      const steps = n.pts.length<=1 ? 1 : Math.max(2, Math.ceil(durBeat*bendSteps));
      let maxAbsDelta=0, clipped=false;
      const bends=[];
      for(let s=0;s<=steps;s++){
        const sec=sSec+(cutSec-sSec)*(s/steps);
        const frac=Math.min(1,(sec-sSec)/fullSec);
        const hz=pitchAt(n,frac);
        const delta=freqToMidi(hz,a4)-base;
        if(Math.abs(delta)>maxAbsDelta) maxAbsDelta=Math.abs(delta);
        let pb=Math.round(8192+(delta/range)*8192);
        const cl=Math.max(0,Math.min(16383,pb));
        if(pb!==cl) clipped=true;
        bends.push({tick:s2q(sec)*ppq, pb14:cl});
        if(n.pts.length<=1) break;
      }
      w.pitchBend(startTick,ch,bends[0].pb14);
      w.noteOn(startTick,ch,base,n.vel||vel);
      for(let s=1;s<bends.length;s++) w.pitchBend(bends[s].tick,ch,bends[s].pb14);
      w.noteOff(endTick,ch,base);
      const overflow = maxAbsDelta>range+1e-9;
      if(overflow) warnings.push(`voice ${v} note @${startBeat.toFixed(2)} reaches ±${maxAbsDelta.toFixed(2)}st — hard-walled at ±${range}st`);
      report.push({
        voice:v, ch:ch+1, start:startBeat, dur:durBeat, type:n.type,
        startHz, base, baseName:midiToName(base),
        cents:(freqToMidi(startHz,a4)-base)*100,
        pb0:bends[0].pb14, span:maxAbsDelta, overflow, clipped
      });
    }
  });
  if(voices.length>16) warnings.push(`${voices.length} voices exceed 16 MIDI channels — higher voices wrap and will share a channel`);
  report.sort((a,b)=>a.start-b.start||a.voice-b.voice);
  return {bytes:w.build(), report, warnings, count:notes.length, voices:voices.length, channelsUsed};
}

/* ---------- MIDI import (uses @tonejs/midi) ----------
   Each source track/channel becomes a voice. Bend is read per-track so
   simultaneous voices on different channels don't bleed into each other. */
function notesFromMidi(arrbuf, importRange, a4){
  const midi=new Midi(arrbuf);
  const a=a4||440;
  const bpm=(midi.header.tempos[0] && midi.header.tempos[0].bpm) || 120;
  const out=[]; let voiceCounter=0;
  midi.tracks.forEach(tr=>{
    if(!tr.notes || !tr.notes.length) return;     // skip empty/conductor tracks
    voiceCounter++; const voice=voiceCounter;
    const bends=(tr.pitchBends||[]).slice().sort((x,y)=>x.time-y.time);
    function bendAt(t){
      if(!bends.length) return 0;
      let v=bends[0].value;
      for(const b of bends){ if(b.time<=t+1e-6) v=b.value; else break; }
      return v;
    }
    tr.notes.slice().sort((x,y)=>x.time-y.time).forEach(nt=>{
      const startBeat=nt.time*bpm/60;
      const durBeat=Math.max(0.02, nt.duration*bpm/60);
      const steps=8; const pts=[];
      for(let s=0;s<=steps;s++){
        const frac=s/steps;
        const tsec=nt.time+Math.min(frac,0.999)*nt.duration;  // sample over [start,end)
        const semis=bendAt(tsec)*importRange;
        pts.push({t:frac, hz:midiToFreq(nt.midi+semis, a)});
      }
      const hzs=pts.map(p=>p.hz);
      const flat=hzs.every(h=>Math.abs(1200*Math.log2(h/hzs[0]))<1.0);
      let type, P;
      if(flat){ type='hold'; P=[{t:0,hz:hzs[0]}]; }
      else {
        const m0=Math.log2(hzs[0]), m1=Math.log2(hzs[hzs.length-1]);
        let lin=true;
        for(let s=0;s<=steps;s++){ const exp=m0+(m1-m0)*(s/steps); if(Math.abs((Math.log2(hzs[s])-exp))*1200>4){lin=false;break;} }
        if(lin){ type='glide'; P=[{t:0,hz:hzs[0]},{t:1,hz:hzs[hzs.length-1]}]; }
        else { type='free'; P=pts.map(p=>({t:p.t,hz:p.hz})); }
      }
      out.push({id:NID++, start:startBeat, dur:durBeat, type, vel:Math.round((nt.velocity||0.75)*127), pts:P, voice});
    });
  });
  return {notes:out, bpm, voices:voiceCounter};
}

/* expose for headless tests */
if(typeof module!=='undefined'){ module.exports={noteNameToMidi,midiToName,midiToFreq,freqToMidi,freqToBend,bendForTargetMidi,MidiWriter,pitchAt,buildMidi}; }
</script>

<script>
/* ============================================================
   EDITOR  (canvas piano roll) — only runs in browser
   ============================================================ */
if(typeof document!=='undefined') (function(){
'use strict';
const stage=document.getElementById('stage');

let DPR=Math.max(1,window.devicePixelRatio||1);

/* ---- view state ---- */
const view={
  pxPerSec:128, pxPerSemi:14,            // seconds is the canvas's true axis
  get pxPerBeat(){ return this.pxPerSec/unitsPerSec(mainSystem()); },  // px per region-local UNIT (a 1/sigDen note), derived per the active chart
  scrollX:0, scrollY:0,                // px
  midiMin:24, midiMax:108,             // C1..C8
  tool:'hold', timeRegime:'meter', pitchRegime:'scale',

  get bpm(){return +bpm.value||120;}, get sigNum(){return +sigNum.value||4;},
  get sigDen(){return +sigDen.value||4;}, get a4(){return +a4.value||440;},
  get range(){return +bendRange.value||2;}, get grid(){return +grid.value||4;},
  get defLen(){ const v=+defLen.value||1; const m=mainSystem();   // dropdown names a note value (quarters); units are 1/sigDen notes

   controls (bpm / time-sig / a4). Notes carry a region id and the id of the system
   they hang on (= main, in the present model). The live draw/MIDI path is unchanged,

           cycleId:activeCycleId, cycDepth:cycDepthVal() } ] };   // cycla is per-region now (Stage 2)
}
let regions=[], activeRegionId=null;
function ensureRegions(){ if(!regions.length){ const r=makeRegion(); r.name='Region 1'; regions=[r]; activeRegionId=r.id; } }

   The hang {region, beat} is authoritative; n.dur is DERIVED from it in home units, so all

/* ============================================================
   TEMPO AS A CHART OVER THE QUARTER AXIS  (the integrator)
   ------------------------------------------------------------
   bpm = ♩/min, the host clock (handover: bpm stays anchored to the quarter). A
   metered region's metric content — its quarter-length Q = bars·sigNum·4/sigDen —
   is the INVARIANT; the tempo curve maps Q to seconds; the region's extent in
   seconds is DERIVED (the golden-rule INVERSION, deliberate: the ♩= ribbon box
   still RELABELS a fixed span; dragging a point in the tempo track RE-TIMES,
   moving the extent and everything downstream — two verbs, two surfaces).

   m.tempo : [{at, bpm, curve}] region-local. at = QUARTERS from region start;
             curve names the segment FROM this point TO the next:
             'square' (hold, then jump = abrupt) | 'linear' (ramp = accel/rall).
   Absent/empty m.tempo  ⇒  implicit [{at:0, bpm:m.bpm, 'square'}]  ⇒  today's flat
   region exactly (#10 parity, proven). A maximal run of ADJACENT metered regions
   shares ONE continuous quarter axis, so a 'linear' point ramps across the bar-line
   seam (continuous tempo track, point 3); a CHRONOLOGICAL region is an opaque
   seconds chunk that BREAKS the run — no tempo there, the track vanishes and
   resumes at the next meter (points 1,2,5). Tempo points never enter free time. */
const Q_OF=(m)=> (m.bars||settings.bars)*(m.sigNum||4)*4/(m.sigDen||4);   // region quarter-length
function effTempo(m){
  const ps=(m.tempo&&m.tempo.length)? m.tempo.map(p=>({at:p.at,bpm:p.bpm,curve:p.curve})) : [{at:0,bpm:m.bpm||120,curve:'linear'}];
  ps.sort((a,b)=>a.at-b.at);
  if(ps[0].at>1e-9) ps.unshift({at:0,bpm:ps[0].bpm,curve:'linear'});       // cover from q=0
  const Q=Q_OF(m); for(const p of ps) p.at=Math.max(0,Math.min(Q,p.at));   // clamp the COPY, not stored data
  return ps;
}
// tempo segments share the note glides' shape vocabulary (shapeK): linear / exp / log / smooth.
// linear keeps an exact closed form; the rest integrate ∫60/bpm numerically (general, handles "etc.").
const TEMPO_CURVES=['linear','exp','log','smooth'];
function _isHold(c){ return !TEMPO_CURVES.includes(c); }                    // legacy 'square' / unknown → flat hold
function _bpmAt(a,c,dq,f){ if(_isHold(a.curve)||Math.abs(c.bpm-a.bpm)<1e-9) return a.bpm;
  return a.bpm+(c.bpm-a.bpm)*shapeK(f/dq, a.curve); }                       // value interpolates by the shape
function _invBpmInt(u0,u1,b0,b1,curve){ const N=32,h=(u1-u0)/N;             // ∫_{u0}^{u1} du/bpm(u) — Simpson
  const f=(u)=>1/(b0+(b1-b0)*shapeK(u,curve)); let s=f(u0)+f(u1);
  for(let i=1;i<N;i++) s+=(i%2?4:2)*f(u0+i*h); return s*h/3; }
function _segSec(dq,b0,b1,curve){ if(dq<=0)return 0;
  if(_isHold(curve)||Math.abs(b1-b0)<1e-9) return 60*dq/b0;                                    // flat / hold
  if(curve==='linear') return 60*dq*Math.log(b1/b0)/(b1-b0);                                   // exact
  return 60*dq*_invBpmInt(0,1,b0,b1,curve); }                                                  // numeric ∫60/bpm
function _segSecPart(f,dq,b0,b1,curve){ if(f<=0)return 0;

  return 60*dq*_invBpmInt(0,f/dq,b0,b1,curve); }
function _segQAt(ds,dq,b0,b1,curve){ if(ds<=0)return 0;

let _tmap=null; function tempoMapDirty(){ _tmap=null; }
/* ---- tempo communication ----------------------------------------------------

   nearest POINTED metered region — backward first (taking its exit), else forward
   (taking its entry). The scalar value crosses chronological walls, exactly like a
   real tempo map; a ramp's *slope* never does, because every run pins flat ±∞
   endpoints, so a run's exit is always static. One pointed region can therefore
   drive every empty region in the score, and moving it re-times them all (the
   extent cascade): metered seconds are derived, chronological seconds are frozen
   in duration but slide in position. ---------------------------------------- */
function regionHasOwnTempo(m){ return m.kind!=='chronological' && m.tempo && m.tempo.length>0; }

function _exitBpm(m){ const p=effTempo(m); return p[p.length-1].bpm; }         // last effective point

  const met=regions.filter(r=>mainSystem(r).kind!=='chronological');          // metered regions, score order
  const out={};

    let v=null;
    for(let j=i-1;j>=0;j--){ const mj=mainSystem(met[j]); if(regionHasOwnTempo(mj)){ v=_exitBpm(mj); break; } }   // prev → exit

/* the score always carries at least one explicit tempo point (unless it is wholly

function buildTempoMap(){

/* ---- snapping ---- */
/* grid step in region-local units: the dropdown names a NOTE VALUE (a 1/div whole note);

  return m.kind==='chronological' ? 1/div : (m.sigDen||4)/div; }
/* ---- Stage 2: cycla is the SOLE grammar; the even grid is a TRIVIAL cycla (isochronous).

   construction (THE GRID LAW is structural, not merely coincident). ---- */

// phases in [0,1) with render levels (0 bar · 1 beat/onset · 2 subdivision)
function regionBarGrid(r){
  const m=mainSystem(r), cyc=regionCycle(r), bpb=(m.sigNum||4);
  if(cyc && !cyc.isEven) return {bpb, phases:cycleBoundaries(cyc, regionCycDepth(r))};

  for(let u=0; u<bpb-1e-9; u+=step){ const lvl = u<1e-9?0 : (Math.abs(u-Math.round(u))<1e-6?1:2); phases.push({phase:u/bpb, level:lvl}); }

function snapBeat(b, r){
  r=r||activeRegion();

  const bar=Math.floor(b/bpb), frac=(b/bpb)-bar;                         // phase within the bar
  let best=g.phases[0].phase, bd=Math.abs(frac-best);
  for(const p of g.phases){ const dd=Math.abs(frac-p.phase); if(dd<bd){bd=dd; best=p.phase;} }

function scaleRootHz(){ return midiToFreq(scaleRootMidi,settings.a4); }

  sc=sc||activeScale;

/* differential pitch snap: snap to the tuning of whichever PITCH region owns that second —
