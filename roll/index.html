/* ---- export timeline: the region tiling rendered as one MIDI tick line ----
   Now driven by the tempo map. Each metered SQUARE segment is one constant-tempo
   chunk (exact). A LINEAR ramp is approximated by N stepped sub-chunks: the cut
   points come from the integrator (_segSecPart), so the (quarter, second) pairs at
   every boundary are EXACT, and each chunk's tempo is set to ups·60 where ups=dq/ds
   — the constant tempo that reproduces that chunk's timing, so MIDI's own
   constant-tempo interpolation agrees with the curve at every boundary (only the
   interior of a ramp is linearised, vanishing as steps rise). A chronological region
   stays one second = one quarter at ♩=60, time-signature 1/4 (the Roll's seconds grid).
   The .mid is a shadow; the timeline is the translation. */
const TEMPO_RAMP_STEPS=24;
function nearestPow2Den(d){ return Math.pow(2,Math.max(0,Math.min(6,Math.round(Math.log2(Math.max(0.5,+d||4)))))); }   // MIDI's sig vocabulary — the .jpeg approximates
function exportTimeline(){
  ensureRegions();
  const t=tmap(); const segs=[]; let q=0;            // q = GLOBAL quarters across the whole score
  const push=(s,ups,bpm,sigNum,sigDen)=>segs.push({q,s,ups,bpm,sigNum,sigDen});
  for(const g of t.segs){
    if(g.chrono){ const ds=g.sec1-g.sec0; push(g.sec0,1,60,1,4); q+=ds*1; continue; }
    const r=regionById(g.region), m=mainSystem(r);
    const sn=Math.max(1,Math.round(m.sigNum||4)), sd=nearestPow2Den(m.sigDen);
    const dq=g.q1-g.q0, ds=g.sec1-g.sec0;
    if(dq<=1e-12||ds<=1e-12) continue;
    if(g.curve!=='linear'||Math.abs(g.bpm1-g.bpm0)<1e-9){
      const ups=dq/ds; push(g.sec0,ups,ups*60,sn,sd); q+=dq;                 // square: one exact chunk
    } else {
      for(let k=0;k<TEMPO_RAMP_STEPS;k++){                                    // ramp: exact cuts, stepped tempo
        const qa=dq*k/TEMPO_RAMP_STEPS, qc=dq*(k+1)/TEMPO_RAMP_STEPS;
        const sa=_segSecPart(qa,dq,g.bpm0,g.bpm1,'linear'), sc=_segSecPart(qc,dq,g.bpm0,g.bpm1,'linear');
        const subDq=qc-qa, subDs=sc-sa; if(subDs<=1e-12) continue;
        const ups=subDq/subDs; push(g.sec0+sa,ups,ups*60,sn,sd); q+=subDq;
      }
    }
  }
  if(!segs.length) segs.push({q:0,s:0,ups:(settings.bpm||120)/60,bpm:settings.bpm||120,sigNum:settings.sigNum||4,sigDen:nearestPow2Den(settings.sigDen)});
  return segs;
}
function qAtSecOn(segs,sec){ let g=segs[0]; for(const x of segs){ if(x.s<=sec+1e-9) g=x; else break; } return g.q+(sec-g.s)*g.ups; }
function secAtQOn(segs,qq){ let g=segs[0]; for(const x of segs){ if(x.q<=qq+1e-9) g=x; else break; } return g.s+(qq-g.q)/g.ups; }
/* every note enters the tick line through its home chart — the same noteStartSec/noteEndSec the
   renderer and player use, so hybrids and per-region tempi land where they are drawn */
function buildMidiFromScore(){
  const segs=exportTimeline();
  const qAtSec=s=>qAtSecOn(segs,s), secAtQ=q=>secAtQOn(segs,q);
  const exp=notes.map(n=>{ const q0=qAtSec(noteStartSec(n)), q1=qAtSec(noteEndSec(n));
    return Object.assign({}, n, {start:q0, dur:Math.max(1e-4,q1-q0)}); });
  return buildMidi(exp, Object.assign(exportOpts(), {timeline:segs, qAtSec, secAtQ}));
}

document.getElementById('expMidi').onclick=()=>{

/* Tabota v2 JSON export (ecosystem bonus) — the determinate fragment.
   Every drawn note is value + position.at + extent.duration in one metered
   frequency frame; voice/velocity ride in payload. A piano roll is, ontologically,
   overdetermination-through-regime: every onset is an absolute coordinate in the
   mother frame, never a note-to-note relation — so the export never needs
   relations, landmarks, ranges, or the recursion. */
document.getElementById('expJson').onclick=()=>{
  if(!notes.length){ flash('nothing to export'); return; }
  ensureRegions(); activeRegion().notes=notes; syncRegionFromControls(); normalizeNotes();
  const noteEvent=n=>{
    const ev={ position:{ at:+n.start.toFixed(4) },
               extent: (n.end&&n.end.region) ? { until:{ event:n.end.region, coord:+n.end.beat.toFixed(4) } }
                                             : { duration:+n.dur.toFixed(4) },
               payload:{ voice:n.voice||1, velocity:n.vel } };
    if(n.type==='hold'){ ev.value={ pitch:{ hz:+pitchAt(n,0).toFixed(3) } }; }
    else if(n.type==='glide' && n.pts.length===2){
      ev.value={ pitch:{ from:+pitchAt(n,0).toFixed(3), to:+pitchAt(n,1).toFixed(3) } };
      const c=segCurve(n,0); if(c && c!=='linear') ev.payload.curve=c;
    } else {
      ev.value={ pitch:{ from:+pitchAt(n,0).toFixed(3), to:+pitchAt(n,1).toFixed(3) } };
      ev.payload.contour = n.pts.map((p,i)=>{ const o={pos:+p.t.toFixed(4), hz:+p.hz.toFixed(3)}; if(n.type==='glide' && i<n.pts.length-1) o.curve=segCurve(n,i); return o; });
    }
    return ev;
  };
  const score = regions.map(r=>{
    const m=mainSystem(r);
    const rNotes=(r.notes||[]).slice().sort((a,b)=>(a.voice||1)-(b.voice||1)||a.start-b.start);
    const voices=[...new Set(rNotes.map(n=>n.voice||1))].sort((a,b)=>a-b);
    const beats=Math.max(1, Math.ceil(Math.max(0,...rNotes.map(n=>n.start+n.dur))));
    const frame={ temporal:'metered',
      temporalSettings:{ beats, bpm:m.bpm, timeSignature:(m.sigNum||4)+'/'+(m.sigDen||4) },
      axis:'frequency', axisSettings:{ a4:m.a4 } };
    if(m.offset) frame.temporalSettings.offset=m.offset;
    const payload={ voices, midiExport:{ rule:'monophonic-per-voice', voiceToChannel:'voice N → base channel + (N-1)', bendRange:settings.range } };
    // tempo curve rides in payload (chart-model §12): region-local points, `at` in
    // quarters from the region start, `curve` names the segment after the point.
    // Absent ⇒ the frame's flat bpm (a reader may ignore this and get today's score).
    if(m.kind!=='chronological' && Array.isArray(m.tempo) && m.tempo.length){
      payload.tempo={ unit:'quarter', points:m.tempo.slice().sort((a,b)=>a.at-b.at)
        .map(p=>({ at:+(+p.at).toFixed(4), bpm:+(+p.bpm).toFixed(3), curve:p.curve||'square' })) };
    }
    return { id:r.id, role:'regime', frame, payload, events: rNotes.map(noteEvent) };
  }).filter(s=>s.events.length || regions.length===1);
  const doc={ projectName:'TabotaRoll', languageVersion:'2.0', metadata:{ profile:'determinate' }, score };
  download(new Blob([JSON.stringify(doc,null,2)],{type:'application/json'}),'tabota-roll.json');
  flash('exported Tabota v2 JSON ('+regions.length+' region'+(regions.length!==1?'s':'')+')');
};

/* Tabota JSON import — reconstruct notes/voices/curves. Reads v2 (the format the
   export above now writes) and still reads legacy v1.5 for old files. Only the
   determinate fragment becomes notes; relational / ranged / referenced events are
   valid Tabota but cannot be drawn on a roll, so they are counted as skipped. */
function tabotaToHz(v, axis, a4){
  if(v==null) return null;
  if(typeof v==='number') return axis==='symbolic' ? midiToFreq(v,a4) : v;   // symbolic number = MIDI; else Hz
  const m=noteNameToMidi(String(v).trim());
  return m!=null ? midiToFreq(m,a4) : null;
}
function _notesFromV1(doc){
  const a4=(doc.modeSettings && +doc.modeSettings.a4) || settings.a4;
  const rs=doc.regimeSettings||{};
  const bpm=(+rs.bpm)||settings.bpm;
  const tr=doc.temporalRegime||'metered';
  const axis=doc.axisMode||'frequency';
  const sig=rs.timeSignature||[settings.sigNum,settings.sigDen];
  const toBeats=(t)=> tr==='chronological' ? (t*bpm/60)*((sig[1]||4)/4) : (+t||0);   // metered: already units of the declared sig
  const evs=doc.events||[]; const out=[]; let seqBeat=0, skipped=0;
  for(const e of evs){
    if(!e || (e.type && e.type!=='line' && e.type!=='point')){ skipped++; continue; }
    let start, dur;
    if(tr==='achronous'){ start=seqBeat; dur=(e.duration!=null?toBeats(e.duration):settings.defLen); if(dur<=0)dur=settings.defLen; seqBeat+=dur; }
    else {
      const st=e.startTime!=null?e.startTime:(e.time!=null?e.time:0); start=toBeats(st);
      if(e.duration!=null) dur=toBeats(e.duration);
      else if(e.endTime!=null) dur=toBeats(e.endTime)-start;
      else dur=settings.defLen;
      if(dur<=0) dur=settings.defLen;
    }
    const voice=Math.max(1, e.voice||1);
    const velo=e.velocity!=null?e.velocity:(+vel.value||96);
    let type, pts, ncurve;
    if(Array.isArray(e.contour) && e.contour.length){
      const cs=e.contour.map(c=>({t:(c.pos!=null?c.pos:c.t)||0, hz:tabotaToHz(c.hz!=null?c.hz:(c.yValue!=null?c.yValue:c.note),axis,a4), curve:c.curve}))
                        .filter(c=>c.hz!=null).sort((x,y)=>x.t-y.t);
      if(cs.length<2){ skipped++; continue; }
      type = cs.some(c=>c.curve) ? 'glide' : 'free';
      pts = cs.map(c=>{ const o={t:Math.max(0,Math.min(1,c.t)), hz:c.hz}; if(c.curve) o.curve=c.curve; return o; });
    } else {
      const sy=tabotaToHz(e.startYValue!=null?e.startYValue:(e.yValue!=null?e.yValue:e.note),axis,a4);
      let ey=tabotaToHz(e.endYValue,axis,a4); if(ey==null) ey=sy;
      if(sy==null){ skipped++; continue; }
      if(Math.abs(1200*Math.log2(ey/sy))<0.5){ type='hold'; pts=[{t:0,hz:sy}]; }
      else { type='glide'; pts=[{t:0,hz:sy},{t:1,hz:ey}]; ncurve=e.curve||'linear'; }
    }
    const n={id:NID++, start, dur, type, vel:velo, voice, pts};
    if(type==='glide' && ncurve) n.curve=ncurve;
    out.push(n);
  }
  const bend=(doc.midiExport && +doc.midiExport.bendRange)||null;
  return {notes:out, bpm, sig, a4, skipped, bend};
}
/* ---- v2 reader: an ADAPTER over the shared interpreter (tabota-resolve.js).
   The Roll no longer interprets Tabota itself — it asks resolve() where everything
   is, then keeps only its receptor's slice (pitched material placed in seconds) and
   converts that to its beat-based note model. Points, achronous/ordinal, bands,
   relational cycles and indeterminate things are dropped (counted as skipped);
   index.html, with the same resolve(), draws them. ---- */
function _notesFromV2(doc){
  const TR = (typeof window!=='undefined') && window.TabotaResolve;
  if(!TR || !TR.resolve){
    flash('resolver (tabota-resolve.js) not loaded — open via a local server');
    return {notes:[], bpm:settings.bpm, sig:[settings.sigNum,settings.sigDen], a4:settings.a4, skipped:0, bend:null};
  }
  const R = TR.resolve(doc);

  // master tempo / time-sig / tuning / bend — from the first metered + pitched frame in the doc
  let mBpm=null,mNum=null,mDen=null,mA4=null,bend=null,mTempo=null;
  (function scan(list){ (list||[]).forEach(e=>{ if(!e||typeof e!=='object') return;
    const f=e.frame||{}, ts=f.temporalSettings||{}, as=f.axisSettings||{};
    if(f.temporal==='metered' && ts.bpm!=null && mBpm==null){ mBpm=+ts.bpm;
      // the tempo curve rides in payload (chart-model §12) — grab it from the same
      // frame that anchors the master bpm so units stay coherent
      if(e.payload && e.payload.tempo && Array.isArray(e.payload.tempo.points)) mTempo=e.payload.tempo.points; }
    if(f.temporal==='metered' && ts.timeSignature && mNum==null){ const p=String(ts.timeSignature).split('/'); mNum=+p[0]||4; mDen=+p[1]||4; }
    if((f.axis==='frequency'||f.axis==='symbolic') && as.a4!=null && mA4==null) mA4=+as.a4;
    if(e.payload && e.payload.midiExport && e.payload.midiExport.bendRange) bend=+e.payload.midiExport.bendRange;
    if(e.events) scan(e.events);
  }); })(doc.score);
  const masterBpm=mBpm||settings.bpm, sigNum_=mNum||settings.sigNum, sigDen_=mDen||settings.sigDen, masterA4=mA4||settings.a4;
  const SPB = (masterBpm/60)*((sigDen_||4)/4);      // seconds -> UNITS (1/sigDen notes) of the Roll's single frame

  const out=[]; let skipped=0;
  for(const n of R.nodes){
    if(n.kind==='point'){ skipped++; continue; }    // points: valid Tabota, invisible on the Roll
    if(n.kind!=='pitch'){ continue; }               // ignore frames, tempo markers, lanes, text
    if(n.start.sec==null || n.tags.includes('ordinal') || !n.pitch){ skipped++; continue; }
    const m=n.pitch.mode;
    if(m!=='hz' && m!=='named' && m!=='glide'){ skipped++; continue; }   // band / relative: not drawable here
    const start=n.start.sec*SPB;
    const end=(n.end && n.end.sec!=null)?n.end.sec*SPB:start+settings.defLen;
    let dur=end-start; if(dur<=0) dur=settings.defLen;
    const voice=Math.max(1,(n.payload&&n.payload.voice)||1);
    const velo=(n.payload&&n.payload.velocity!=null)?n.payload.velocity:(+vel.value||96);

    let type, pts, ncurve;
    const contour = n.payload && Array.isArray(n.payload.contour) ? n.payload.contour : null;
    if(contour && contour.length>=2){
      const cs=contour.map(c=>({t:(c.pos!=null?c.pos:c.t)||0, hz:tabotaToHz(c.hz!=null?c.hz:(c.note!=null?c.note:c.yValue),'frequency',masterA4), curve:c.curve}))
                      .filter(c=>c.hz!=null).sort((a,b)=>a.t-b.t);
      if(cs.length<2){ skipped++; continue; }
      type=cs.some(c=>c.curve)?'glide':'free';
      pts=cs.map(c=>{ const o={t:Math.max(0,Math.min(1,c.t)),hz:c.hz}; if(c.curve)o.curve=c.curve; return o; });
    } else if(m==='glide'){
      const a=n.pitch.from, b=n.pitch.to; if(a==null||b==null){ skipped++; continue; }
      if(Math.abs(1200*Math.log2(b/a))<0.5){ type='hold'; pts=[{t:0,hz:a}]; }
      else { type='glide'; pts=[{t:0,hz:a},{t:1,hz:b}]; ncurve=(n.payload&&n.payload.curve)||'linear'; }
    } else {
      const hz=n.pitch.hz; if(hz==null){ skipped++; continue; }
      type='hold'; pts=[{t:0,hz}];
    }
    const note={id:NID++, start, dur, type, vel:velo, voice, pts};
    if(type==='glide' && ncurve) note.curve=ncurve;
    out.push(note);
  }
  return {notes:out, bpm:masterBpm, sig:[sigNum_,sigDen_], a4:masterA4, skipped, bend, tempo:mTempo};
}
function _hasV2Shape(list){
  return Array.isArray(list) && list.some(ev=> ev && (ev.frame || ev.value || ev.position || ev.ref));
}
function notesFromTabota(doc){
  const v2 = (doc && typeof doc.languageVersion==='string' && /^2\./.test(doc.languageVersion)) || _hasV2Shape(doc && doc.score);
  return v2 ? _notesFromV2(doc) : _notesFromV1(doc);
}

  notes=res.notes; clearGran();
  bpm.value=Math.round(res.bpm);
  if(res.sig){ sigNum.value=res.sig[0]||4; sigDen.value=res.sig[1]||4; }
  a4.value=res.a4; if(res.bend){ bendRange.value=res.bend; }
  regions=[makeRegion()]; regions[0].name='Imported'; activeRegionId=regions[0].id; renderRegionTabs();   // fresh region from the imported frame; notes tag to it via normalizeNotes
  // single-region docs round-trip losslessly: notes recover their beats through the flat
  // resolver, so re-attaching the curve reproduces the original seconds exactly. multi-region
  // docs are flattened (a known Roll-import limitation), so the per-region curve is dropped there.
  if(res.tempo && res.tempo.length && Array.isArray(doc.score) && doc.score.length===1){
    const m=mainSystem(regions[0]);
    m.tempo=res.tempo.slice().sort((a,b)=>(+a.at||0)-(+b.at||0))
      .map(p=>({at:Math.max(0,+p.at||0), bpm:+p.bpm||m.bpm, curve:p.curve==='linear'?'linear':'square'}));
    tempoMapDirty();
  }
  NID=Math.max(NID,0,...notes.map(n=>n.id))+1;
  const maxB=Math.max(0,...notes.map(n=>n.start+n.dur));
  bars.value=Math.max(1, Math.ceil((maxB+0.5)/Math.max(1,settings.sigNum)));
  fitContent(); changed();
  flash(`imported ${notes.length} events`+(res.skipped?` · ${res.skipped} skipped`:''));
  impJsonFile.value='';
};

document.getElementById('clearAll').onclick=()=>{
  if(!confirm('Clear everything — notes AND regions — back to one free-time canvas?')) return;
  pushHistory();
  notes=[]; clearGran();
  // one chronological (free-time) region: a blank slate with no meter, seconds only
  REGID=1; const r=makeRegion(); r.name='Region 1';
  const m=mainSystem(r); m.kind='chronological'; m.bars=settings.bars||8;   // bars means SECONDS in free time
  regions=[r]; activeRegionId=r.id;
  PRID=1; pitchRegions=[{id:'p'+(PRID++), startSec:0, scaleId:'12tet', regime:'scale'}]; activePitchRegionId=pitchRegions[0].id;
  applyRegionToControls(activeRegion());   // stale-controls rule: push model → DOM before changed() syncs back
  updateRegionIndicator();
  fitContent(); changed();
  flash('cleared to free time');
};

function download(blob,name){ const u=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=u; a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(u),1500); }
let flashTimer=null;
function flash(msg){ status.innerHTML=`<span style="color:var(--tide)">${msg}</span>`; clearTimeout(flashTimer); flashTimer=setTimeout(updateStatus,3200); }

/* ============================================================
   SEED + BOOT
   ============================================================ */
function seed(){
  const a=settings.a4; const semis=x=>a*Math.pow(2,x/12);
  scaleRootMidi=69; populateRoot();                     // root the scale lattice at A — the whole seed is built from a4, so JI degrees land ON the drawn grid
  REGID=1;
  const A={id:newRegionId(), name:'Intro', main:'m', systems:[{id:'m',kind:'metered',     bpm:120,sigNum:4,sigDen:4,a4:a,bars:2,offset:0,axis:'frequency'}]};   // 4 bars, cut to 2 (measures 3-4 removed)
  const B={id:newRegionId(), name:'Free',  main:'m', systems:[{id:'m',kind:'chronological',bpm:120,sigNum:4,sigDen:4,a4:a,bars:4,offset:0,axis:'frequency'}]};
  const C={id:newRegionId(), name:'Coda',  main:'m', systems:[{id:'m',kind:'metered',     bpm:90, sigNum:5,sigDen:8,a4:a,bars:2.3,offset:0,axis:'frequency'}]};   // 5/8 — units are eighths, the bar spans 2.5♩; 2.3 measures, extents needn't be whole
  regions=[A,B,C]; activeRegionId=A.id;
  PRID=1;
  pitchRegions=[                                        // tuning charts decouple from time regions:
    {id:'p'+(PRID++), startSec:0, scaleId:'12tet', regime:'scale'},
    {id:'p'+(PRID++), startSec:6, scaleId:'just5', regime:'scale'},   // split mid-Free — JI grid from here on
  ];
  activePitchRegionId=pitchRegions[0].id;
  // JI degrees from the A root: 1/1 9/8 5/4 4/3 3/2 5/3 15/8 (5-limit major)
  const ji=r=>a*r;
  notes=[
    // A — metered 4/4 @120, 2 bars (start/dur in beats)
    {id:NID++,region:A.id,start:0,dur:8,type:'hold', vel:70, voice:2,pts:[{t:0,hz:semis(-5)}]},                              // drone (E4-ish, visible)
    {id:NID++,region:A.id,start:0,dur:1,type:'hold', vel:100,voice:1,pts:[{t:0,hz:a}]},
    {id:NID++,region:A.id,start:1,dur:1,type:'hold', vel:100,voice:1,pts:[{t:0,hz:semis(3.5)}]},                              // neutral third
    {id:NID++,region:A.id,start:2,dur:2,type:'glide',curve:'smooth',vel:100,voice:1,pts:[{t:0,hz:semis(7)},{t:1,hz:semis(12)}]},
    {id:NID++,region:A.id,start:4,dur:2,type:'glide',vel:95, voice:1,pts:[                                                    // multi-point, per-segment curves
       {t:0,hz:semis(12),curve:'exp'},{t:.5,hz:semis(8),curve:'log'},{t:1,hz:semis(10)}]},
    // HYBRID: starts at Intro beat 6, ends 1.0s INTO Free — endpoints on two different charts
    {id:NID++,region:A.id,start:6,dur:3,type:'glide',curve:'smooth',vel:100,voice:1,
     end:{region:B.id,beat:1.0},pts:[{t:0,hz:semis(5)},{t:1,hz:semis(14)}]},
    // B — chronological @4s (start/dur in SECONDS)
    {id:NID++,region:B.id,start:1.6,dur:0.6,type:'hold', vel:90, voice:1,pts:[{t:0,hz:semis(9)}]},                            // 5.6s abs — still 12-TET ground
    {id:NID++,region:B.id,start:2.6,dur:1.4,type:'glide',curve:'exp',vel:90, voice:1,pts:[{t:0,hz:ji(9/8)},{t:1,hz:ji(2*9/8)}]},   // 6.6s abs — past the tuning seam, so it speaks in ratios
    // SHOWCASE: one line crossing BOTH kinds of chart — onset at 4.8s on the 12-TET
    // grid (equal fifth, 700¢), end hung on Coda's chart at eighth 3 (9s abs), landing
    // on the just major third (5/4, 386¢) of the JI grid that takes over at 6s
    {id:NID++,region:B.id,start:0.8,dur:5.2,type:'glide',curve:'smooth',vel:95,voice:2,
     end:{region:C.id,beat:3},pts:[{t:0,hz:semis(7)},{t:1,hz:ji(2*5/4)}]},
    // C — metered 5/8 @♩=90 (eighths tick at 180/min), entirely on the JI chart: an
    // A-major arpeggio in whole-number ratios (the third sits −13.7¢ from its equal neighbour)
    {id:NID++,region:C.id,start:0,dur:1,type:'hold',vel:100,voice:1,pts:[{t:0,hz:ji(2)}]},
    {id:NID++,region:C.id,start:1,dur:1,type:'hold',vel:90, voice:1,pts:[{t:0,hz:ji(2*5/4)}]},
    {id:NID++,region:C.id,start:2,dur:1,type:'hold',vel:90, voice:1,pts:[{t:0,hz:ji(2*3/2)}]},
    {id:NID++,region:C.id,start:3,dur:3,type:'hold',vel:100,voice:1,pts:[{t:0,hz:ji(4)}]},
  ];
}
populateRoot(); populateScaleSelect(); loadManifest();
populateCycleSelect(); loadCycManifest();
window.addEventListener('load',()=>{
  resize(); seed(); applyRegionToControls(activeRegion()); updateRegionIndicator(); fitContent(); regimePill(); changed();
  // The flex layout and the late Google-fonts swap resize the canvas box AFTER load, so the first
  // fit runs against a smaller canvas and the seed reads compressed. Re-fit once the box settles.
  // Bounded to a short startup window so a slow font swap can't clobber a view the user has by then
  // zoomed/scrolled themselves.
  const bootAt=performance.now();
  const refit=()=>{ if(performance.now()-bootAt<4000){ resize(); fitContent(); } };
  requestAnimationFrame(()=>requestAnimationFrame(refit));
  if(document.fonts && document.fonts.ready) document.fonts.ready.then(refit);
});
resize(); // initial (in case load already fired)
})();
</script>
