  const fTop=yToHz(GUT_T), fBot=yToHz(cv.clientHeight);
  const cHi=1200*Math.log2(fTop/root), cLo=1200*Math.log2(fBot/root);
  const kLo=Math.floor(cLo/P), kHi=Math.ceil(cHi/P);
  const out=[];
  if((kHi-kLo)*sc.degreesCents.length > 4000) return out; // safety when zoomed far out
  for(let k=kLo;k<=kHi;k++){
    sc.degreesCents.forEach((d,idx)=>{
      const cents=k*P+d;
      if(cents<cLo-1||cents>cHi+1) return;
      out.push({hz:root*Math.pow(2,cents/1200), idx, k, isRoot:idx===0});
    });
  }
  return out;
}

/* ---- resize ---- */
function resize(){
  DPR=Math.max(1,window.devicePixelRatio||1);
  const r=cv.getBoundingClientRect();
  const w=Math.round(r.width*DPR), h=Math.round(r.height*DPR);
  if(cv.width!==w||cv.height!==h){ cv.width=w; cv.height=h; }
  ctx.setTransform(DPR,0,0,DPR,0,0);
  draw();
}
window.addEventListener('resize',resize);
// Keep the canvas buffer in sync with its actual box — toolbar wrapping and late
// web-font swaps change the canvas height after load, which otherwise desyncs
// click coordinates from drawn positions (the "dot above the cursor" offset).
if(typeof ResizeObserver!=='undefined'){ try{ new ResizeObserver(()=>resize()).observe(cv); }catch(e){} }
if(document.fonts && document.fonts.ready){ document.fonts.ready.then(()=>resize()); }

/* ---- colors ---- */
const C=getComputedStyle(document.documentElement);
const col=n=>C.getPropertyValue(n).trim();
// color encodes VOICE; shape encodes type. Hued, no achromatic; ember reserved for selection.
const VOICE_COLORS=['#11897e','#c42a6b','#6f8f00','#6a47d8','#1f7ac4','#b5179e','#a86400','#3a55cf'];
function voiceColor(v){ return VOICE_COLORS[(((v||1)-1)%VOICE_COLORS.length+VOICE_COLORS.length)%VOICE_COLORS.length]; }

/* ============================================================
   DRAW
   ============================================================ */
function draw(){
  const W=cv.clientWidth, H=cv.clientHeight;
  ctx.clearRect(0,0,W,H);
  // note area bg — the working field ends at the double bar; past it the page is a blank field
  const endX=Math.max(GUT_L,Math.min(W,secToX(totalSec())));
  ctx.fillStyle=col('--note-bg'); ctx.fillRect(GUT_L,GUT_T,endX-GUT_L,H-GUT_T);

  drawPitchGrid(W,H);
  drawAllGrids(W,H);
  drawNotes(W,H);
  drawRegionFrames(W,H);
  drawPlayhead(W,H);

  // gutters cover spill
  drawGutters(W,H);
  if(typeof drawScrub==='function') drawScrub();   // the playhead lane shares the same x-frame
  if(typeof drawTempo==='function' && tempoOpen) drawTempo();   // the tempo lane shares it too
}

function drawPitchGrid(W,H){
  /* each PITCH region paints its own tuning grid over its own span — side by side on the clock,
     no focusing required to see a chart. Lines stop at the double bar; past it the field is blank. */
  const endX=Math.max(GUT_L,Math.min(W,secToX(totalSec())));
  ensurePitchRegions();
  for(let i=0;i<pitchRegions.length;i++){
    const p=pitchRegions[i];
    const x0=Math.max(GUT_L,secToX(p.startSec));
    const x1=(i+1<pitchRegions.length)?Math.min(endX,secToX(pitchRegions[i+1].startSec)):endX;
    if(x1<=x0||x1<GUT_L||x0>W) continue;
    ctx.save(); ctx.beginPath(); ctx.rect(x0,GUT_T,x1-x0,H-GUT_T); ctx.clip();
    drawPitchGridSpan(p,x0,x1,H);
    ctx.restore();
  }
}
function drawPitchGridSpan(p,x0,x1,H){
  const sc=SCALES[p.scaleId]||activeScale, regime=p.regime||'scale';
  if(regime==='scale' && sc.is12){
    const top=Math.ceil(yToMidi(GUT_T)), bot=Math.floor(yToMidi(H));
    for(let m=bot;m<=top;m++){
      const y=midiToY(m); const pc=((m%12)+12)%12;
      const black=[1,3,6,8,10].includes(pc);
      if(black){ ctx.fillStyle='rgba(106,71,216,0.07)'; ctx.fillRect(x0,y-view.pxPerSemi,x1-x0,view.pxPerSemi); }
      ctx.strokeStyle = pc===0 ? 'rgba(17,137,126,0.34)' : 'rgba(40,82,76,0.10)';
      ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(x0,Math.round(y)+.5); ctx.lineTo(x1,Math.round(y)+.5); ctx.stroke();
    }
  } else if(regime==='scale'){
    // generic scale: period-start lines strong, degree lines faint
    const lines=scaleDegreeLinesFor(sc);
    const showDeg = view.pxPerSemi*(sc.periodCents/100)/Math.max(1,sc.degreesCents.length) >= 5;
    for(const ln of lines){
      const y=hzToY(ln.hz);
      if(ln.isRoot){ ctx.strokeStyle='rgba(17,137,126,0.40)'; ctx.lineWidth=1.4; }
      else { if(!showDeg) continue; ctx.strokeStyle='rgba(40,82,76,0.12)'; ctx.lineWidth=1; }
      ctx.beginPath(); ctx.moveTo(x0,Math.round(y)+.5); ctx.lineTo(x1,Math.round(y)+.5); ctx.stroke();
    }
  } else {
    // frequency regime: octave lines strong, semitones faint (display is scale-independent)
    const top=Math.ceil(yToMidi(GUT_T)), bot=Math.floor(yToMidi(H));
    for(let m=bot;m<=top;m++){
      const y=midiToY(m); const pc=((m%12)+12)%12;
      ctx.strokeStyle = pc===0 ? 'rgba(17,137,126,0.30)' : 'rgba(40,82,76,0.07)';
      ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(x0,Math.round(y)+.5); ctx.lineTo(x1,Math.round(y)+.5); ctx.stroke();
    }
  }
}

/* (drawTimeGrid removed — Stage 2. It was dead code, the sole cycla-phase renderer,
   orphaned by the region build; drawAllGrids now renders every region's own cycla.) */

function drawAllGrids(W,H){
  ensureRegions();
  for(const r of regions){
    const m=mainSystem(r); const s0=regionStartSec(r), len=regionSecLen(r);
    const x0=secToX(s0), x1=secToX(s0+len);
    if(x1<GUT_L||x0>W) continue;
    _ctxRegion=r;
    ctx.save(); const cx0=Math.max(GUT_L,x0), cx1=Math.min(W,x1);
    ctx.beginPath(); ctx.rect(cx0,GUT_T,Math.max(0,cx1-cx0),H-GUT_T); ctx.clip();
    if(m.kind==='chronological'){
      // free time: ONE seconds grid, no subdivisions — visually and functionally not a 4/4
      const pps=view.pxPerSec; let step=1; if(pps<40) step=Math.pow(10,Math.ceil(Math.log10(40/pps)));
      ctx.strokeStyle='rgba(17,137,126,0.30)'; ctx.lineWidth=1;
      for(let s=0;s<=len+1e-6;s+=step){ const x=secToX(s0+s); ctx.beginPath(); ctx.moveTo(Math.round(x)+.5,GUT_T); ctx.lineTo(Math.round(x)+.5,H); ctx.stroke(); }
    } else {
      // metered: draw the region's OWN cycla grid (even = trivial cycla). regionBarGrid is the
      // SAME source snapBeat reads, so every drawn line is a snap target and vice-versa.
      const g=regionBarGrid(r), bpb=g.bpb, barsN=Math.ceil((m.bars||settings.bars)-1e-9);
      const dense = (pxPerBeatIn(r)*bpb)/Math.max(1,g.phases.length) < 5;   // hide deep onsets when cramped
      const line=(beat,style,lw)=>{ ctx.strokeStyle=style; ctx.lineWidth=lw; const x=beatToX(beat);
        ctx.beginPath(); ctx.moveTo(Math.round(x)+.5,GUT_T); ctx.lineTo(Math.round(x)+.5,H); ctx.stroke(); };
      for(let bar=0; bar<barsN; bar++){
        for(const p of g.phases){ if(p.phase<=0) continue;              // phase 0 = bar line, drawn below
          if(dense && p.level>1) continue;
          const a = p.level>=2 ? Math.max(0.05, 0.16-(p.level-1)*0.04) : 0.16;
          line((bar+p.phase)*bpb, `rgba(40,82,76,${a})`, 1);
        }
      }
      ctx.lineWidth=1.4;                                                // bar lines (teal), incl. the end
      for(let k=0;k<=barsN+1e-6;k++) line(k*bpb,'rgba(17,137,126,0.40)',1.4);
    }
    ctx.restore();
  }
  _ctxRegion=null;
}
function drawRegionFrames(W,H){
  ensureRegions();
  ctx.save(); ctx.beginPath(); ctx.rect(GUT_L,GUT_T,W-GUT_L,H-GUT_T); ctx.clip();
  const row1Rects=[];                       // x-extents occupied on the first flag row (time flags + handles)
  for(const r of regions){
    const s0=regionStartSec(r), x0=secToX(s0); const active=(r.id===activeRegionId);
    if(s0>0 && x0>=GUT_L-1 && x0<=W){ ctx.strokeStyle='rgba(106,71,216,0.6)'; ctx.lineWidth=1.6; ctx.setLineDash([5,3]);
      ctx.beginPath(); ctx.moveTo(Math.round(x0)+.5,GUT_T); ctx.lineTo(Math.round(x0)+.5,H); ctx.stroke(); ctx.setLineDash([]);
      // backward end-flag handle (drag = cannibalize on the left region's grid)
      if(x0>=GUT_L+13){ ctx.fillStyle='rgba(106,71,216,0.18)'; ctx.fillRect(x0-12,GUT_T+3,11,15);
        ctx.fillStyle='rgba(106,71,216,0.95)'; ctx.font='10px ui-monospace, Menlo, monospace'; ctx.fillText('\u25c2|', x0-11, GUT_T+14);
        row1Rects.push({x:x0-12,w:11}); } }
    const m=mainSystem(r);
    const label=(r.name||r.id)+(m.kind==='chronological'?'  free':('  \u2669'+Math.round(m.bpm)+' '+(m.sigNum||4)+'/'+(m.sigDen||4)));
    ctx.font='10px ui-monospace, Menlo, monospace';
    const lx=Math.min(W-4, Math.max(GUT_L+4, x0+6)); const tw=ctx.measureText(label).width+10;
    ctx.fillStyle = active ? 'rgba(17,137,126,0.16)' : 'rgba(231,223,238,0.66)';
    ctx.fillRect(lx-5, GUT_T+3, tw, 15);
    row1Rects.push({x:lx-5,w:tw});
    ctx.fillStyle = active ? col('--tide') : 'rgba(40,82,76,0.62)';
    ctx.fillText(label, lx, GUT_T+14);
  }
  // end of piece: a double bar, as in notation — with the last region's draggable end-flag
  { const endX=secToX(regions.reduce((s,r)=>s+regionSecLen(r),0));
    if(endX>=GUT_L-2 && endX<=W+4){ ctx.strokeStyle='rgba(17,137,126,0.55)';
      ctx.lineWidth=1.2; ctx.beginPath(); ctx.moveTo(Math.round(endX-4)+.5,GUT_T); ctx.lineTo(Math.round(endX-4)+.5,H); ctx.stroke();
      ctx.lineWidth=3;   ctx.beginPath(); ctx.moveTo(Math.round(endX)+.5,GUT_T);   ctx.lineTo(Math.round(endX)+.5,H);   ctx.stroke();
      if(endX>=GUT_L+13){ ctx.fillStyle='rgba(106,71,216,0.18)'; ctx.fillRect(endX-12,GUT_T+3,11,15);
        ctx.fillStyle='rgba(106,71,216,0.95)'; ctx.font='10px ui-monospace, Menlo, monospace'; ctx.fillText('\u25c2|', endX-11, GUT_T+14);
        row1Rects.push({x:endX-12,w:11}); } } }
  // tuning track — one sticky flag per PITCH region (non-extent-defining; hangs on seconds)
  { ensurePitchRegions();
    ctx.font='10px ui-monospace, Menlo, monospace';
    for(let i=0;i<pitchRegions.length;i++){
      const p=pitchRegions[i];
      const nx = (i+1<pitchRegions.length)? secToX(pitchRegions[i+1].startSec) : W+200;
      const x0=secToX(p.startSec);
      if(nx<GUT_L||x0>W) continue;
      // tuning divider: full height like a time slice, but DOTTED (round caps) so the two read apart
      if(p.startSec>0 && x0>=GUT_L-1){ ctx.strokeStyle='rgba(106,71,216,0.5)'; ctx.lineWidth=1.5; ctx.setLineDash([0.5,5]); ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(Math.round(x0)+.5,GUT_T); ctx.lineTo(Math.round(x0)+.5,H); ctx.stroke(); ctx.setLineDash([]); ctx.lineCap='butt'; }
      const sc=(SCALES[p.scaleId]&&SCALES[p.scaleId].name)||p.scaleId;
      const label = sc + (p.regime==='freq'?' · Hz':'');
      const lx=Math.min(nx-4, Math.max(GUT_L+4, x0+4));
      const tw=ctx.measureText(label).width+10;
      // share the first row with the time flags; stack below (pitch goes under) only when they'd collide on view
      const collide=row1Rects.some(rr=> lx-4 < rr.x+rr.w+2 && rr.x < lx-4+tw+2);
      const fy = collide ? GUT_T+20 : GUT_T+3;
      const focused=(p.id===activePitchRegionId);
      ctx.fillStyle = focused ? 'rgba(106,71,216,0.22)' : 'rgba(106,71,216,0.10)';
      ctx.fillRect(lx-4, fy, tw, 14);
      ctx.fillStyle = focused ? 'rgba(106,71,216,1)' : 'rgba(106,71,216,0.7)';
      ctx.fillText(label, lx, fy+10);
    }
  }
  ctx.restore();
}

function drawNotes(W,H){
  ctx.save(); ctx.beginPath(); ctx.rect(GUT_L,GUT_T,W-GUT_L,H-GUT_T); ctx.clip();
  ctx.lineCap='round'; ctx.lineJoin='round';
  for(const n of notes){
    _ctxRegion=regionById(n.region);
    const x0=beatToX(n.start), x1=beatToX(n.start+Math.max(n.dur,0.0001));
    if(x1<GUT_L||x0>W) continue;
    const sel=selection.has(n.id);
    const segOf=(segSel && segSel.note===n)? segSel.seg : -1;
    const part=ptSel.get(n);                              // Set<idx> of partially-selected points, or undefined
    const psel=(i)=> sel || (part&&part.has(i));
    const c=voiceColor(n.voice);
    // selection underlay (ember glow, reads regardless of voice hue)
    if(sel){ ctx.strokeStyle=col('--ember'); ctx.globalAlpha=.30; ctx.lineWidth=10; strokeContour(n,x0,x1); ctx.globalAlpha=1; }
    // soft halo (the "aura" — grabbing it moves the whole note)
    ctx.strokeStyle=c; ctx.globalAlpha=.20; ctx.lineWidth=9; strokeContour(n,x0,x1); ctx.globalAlpha=1;
    // main (thin) line — grabbing it selects a single segment
    ctx.strokeStyle=c; ctx.lineWidth=2.6; strokeContour(n,x0,x1);
    // selected segment overlay (clicked segment, or partial segments whose both ends are selected)
    if(segOf>=0){ ctx.strokeStyle=col('--ember'); ctx.lineWidth=3.6; strokeSegment(n,segOf); }
    if(part){ ctx.strokeStyle=col('--ember'); ctx.lineWidth=3.6;
      for(let i=0;i<n.pts.length-1;i++){ if(part.has(i)&&part.has(i+1)) strokeSegment(n,i); } }
    // endpoints + interior points + voice badge
    const yS=hzToY(pitchAt(n,0)), yE=hzToY(pitchAt(n,1)), lastSeg=n.pts.length-2;
    const startSel=sel||segOf===0||psel(0), endSel=sel||segOf===lastSeg||psel(n.pts.length-1);
    const showBadge = (sel||segOf>=0||part) || (n.dur*view.pxPerBeat>26 && view.pxPerSemi>8);
    if(showBadge) voiceBadge(x0,yS,n.voice,c,startSel); else handle(x0,yS,startSel);
    handle(x1,yE,endSel);
    if(n.end&&n.end.region){ ctx.strokeStyle='rgba(106,71,216,0.95)'; ctx.lineWidth=2;   // hybrid: end hangs on another region
      ctx.beginPath(); ctx.arc(x1,yE,7,0,Math.PI*2); ctx.stroke(); }
    if(n.pts.length>2){
      const showPts = sel || segOf>=0 || !!part;
      for(let i=1;i<n.pts.length-1;i++){
        const px=beatToX(n.start+n.pts[i].t*n.dur), py=hzToY(n.pts[i].hz);
        const hi = sel || segOf===i-1 || segOf===i || psel(i);
        if(showPts) handle(px,py,hi); else dot(px,py,c);
      }
    }
    // tentative "ghost" point — a point-tool add being placed by the held drag; not committed until release
    if(drag && drag.ghost && drag.ghost.note===n){ const gp=n.pts[drag.ghost.idx];
      if(gp){ const gx=beatToX(n.start+gp.t*n.dur), gy=hzToY(gp.hz);
        ctx.save(); ctx.strokeStyle=col('--algae'); ctx.lineWidth=2; ctx.setLineDash([3,3]); ctx.globalAlpha=.7;
        ctx.beginPath(); ctx.arc(gx,gy,7.5,0,7); ctx.stroke();
        ctx.setLineDash([]); ctx.globalAlpha=.4; ctx.fillStyle=col('--algae');
        ctx.beginPath(); ctx.arc(gx,gy,3.6,0,7); ctx.fill(); ctx.restore(); }
    }
  }
  _ctxRegion=null;
  ctx.restore();
}
function strokeContour(n,x0,x1){
  ctx.beginPath();
  if(n.pts.length<=1){ const y=hzToY(pitchAt(n,0)); ctx.moveTo(x0,y); ctx.lineTo(x1,y); return ctx.stroke(); }  // hold = flat line
  const samples=Math.max(4,Math.ceil((x1-x0)/3));   // sample (handles curves, per-segment, multi-point, freehand)
  for(let s=0;s<=samples;s++){ const f=s/samples; const x=x0+(x1-x0)*f; const y=hzToY(pitchAt(n,f)); s?ctx.lineTo(x,y):ctx.moveTo(x,y); }
  ctx.stroke();
}
function strokeSegment(n,i){
  if(n.pts.length<2) return;
  const a=n.pts[i].t, b=n.pts[i+1].t;
  const steps=Math.max(2,Math.ceil((b-a)*n.dur*view.pxPerBeat/3));
  ctx.beginPath();
  for(let s=0;s<=steps;s++){ const f=a+(b-a)*(s/steps); const x=beatToX(n.start+f*n.dur); const y=hzToY(pitchAt(n,f)); s?ctx.lineTo(x,y):ctx.moveTo(x,y); }
  ctx.stroke();
}
function voiceBadge(x,y,v,c,sel){
  ctx.save();
  ctx.fillStyle=c; ctx.strokeStyle=sel?col('--ember'):'#fff'; ctx.lineWidth=sel?2:1.4;
  ctx.beginPath(); ctx.arc(x,y,7,0,7); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#fff'; ctx.font='600 9px '+col('--mono'); ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(String(v),x,y+0.5);
  ctx.restore();
}
function roundRect(x,y,w,h,r){ r=Math.min(r,h/2,w/2); ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function handle(x,y,sel){ ctx.fillStyle=sel?col('--ember'):'#fff'; ctx.strokeStyle=sel?col('--ember'):col('--ink-dim');
  ctx.lineWidth=1.4; ctx.beginPath(); ctx.arc(x,y,sel?4.5:3.4,0,7); ctx.fill(); ctx.stroke(); }
function dot(x,y,c){ ctx.fillStyle=c; ctx.beginPath(); ctx.arc(x,y,2.6,0,7); ctx.fill(); }

function drawGutters(W,H){
  // corner
  ctx.fillStyle=col('--panel'); ctx.fillRect(0,0,GUT_L,H); ctx.fillRect(0,0,W,GUT_T);
  ctx.strokeStyle=col('--edge'); ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(GUT_L+.5,0); ctx.lineTo(GUT_L+.5,H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,GUT_T+.5); ctx.lineTo(W,GUT_T+.5); ctx.stroke();

  // pitch labels (left)
  ctx.save(); ctx.beginPath(); ctx.rect(0,GUT_T,GUT_L,H-GUT_T); ctx.clip();
  ctx.font='10px '+col('--mono'); ctx.textBaseline='middle';
  const top=Math.ceil(yToMidi(GUT_T)), bot=Math.floor(yToMidi(H));
  if(view.pitchRegime==='scale' && activeScale.is12){
    const everyC=view.pxPerSemi<9;
    for(let m=bot;m<=top;m++){ const pc=((m%12)+12)%12; if(everyC && pc!==0) continue; if(!everyC && view.pxPerSemi<13 && [1,3,6,8,10].includes(pc)) continue;
      const y=midiToY(m);
      ctx.fillStyle = pc===0?col('--tide'):col('--ink-dim');
      ctx.textAlign='right'; ctx.fillText(midiToName(m),GUT_L-7,y); }
  } else if(view.pitchRegime==='scale'){
    const lines=scaleDegreeLines();
    const showDeg = view.pxPerSemi*(activeScale.periodCents/100)/Math.max(1,activeScale.degreesCents.length) >= 11;
    ctx.textAlign='right';
    for(const ln of lines){ const y=hzToY(ln.hz);
      if(ln.isRoot){ ctx.fillStyle=col('--tide'); ctx.fillText(midiToName(scaleRootMidi+0).replace(/[0-9-]+$/,'')+'·'+(ln.hz>=1000?(ln.hz/1000).toFixed(2)+'k':ln.hz.toFixed(ln.hz<100?1:0)),GUT_L-7,y); }
      else if(showDeg){ ctx.fillStyle=col('--ink-faint'); ctx.fillText(ln.idx+'',GUT_L-7,y); }
    }
  } else {
    // frequency: label at octaves with Hz
    for(let m=bot;m<=top;m++){ const pc=((m%12)+12)%12; if(pc!==0 && view.pxPerSemi<22) continue;
      const y=midiToY(m); const hz=midiToFreq(m,settings.a4);
      ctx.fillStyle=pc===0?col('--tide'):col('--ink-dim'); ctx.textAlign='right';
      ctx.fillText((hz>=1000?(hz/1000).toFixed(2)+'k':hz.toFixed(hz<100?1:0)),GUT_L-7,y); }
  }
  ctx.restore();

  // time labels (top)
  ctx.save(); ctx.beginPath(); ctx.rect(GUT_L,0,W-GUT_L,GUT_T); ctx.clip();
  ctx.font='10px '+col('--mono'); ctx.textBaseline='middle'; ctx.textAlign='left';
  const bpb=settings.sigNum, tb=totalBeats();
  if(view.timeRegime==='meter'){
    const firstB=Math.floor(xToBeat(GUT_L)), lastB=Math.ceil(xToBeat(W));
    for(let k=Math.max(0,Math.floor(firstB/bpb)); k*bpb<=Math.min(tb,lastB)+1e-9; k++){
      const x=beatToX(k*bpb); ctx.fillStyle=col('--ink'); ctx.fillText((k+1)+'',x+3,GUT_T/2);
    }
  } else {
    const spb=1/unitsPerSec(mainSystem()), totalSec=tb*spb;
    const pxPerSec=view.pxPerBeat/spb; let step=1; if(pxPerSec<46) step=Math.pow(10,Math.ceil(Math.log10(46/pxPerSec)));
    const firstS=Math.floor(xToBeat(GUT_L)*spb), lastS=Math.ceil(xToBeat(W)*spb);
    for(let s=Math.max(0,Math.floor(firstS/step)*step); s<=Math.min(totalSec,lastS); s+=step){
      const x=beatToX(s/spb); ctx.fillStyle=col('--ink');
      const lab = step>=1? s+'s' : s.toFixed(2)+'s';
      ctx.fillText(lab,x+3,GUT_T/2);
    }
  }
  ctx.restore();
}

/* the playhead is an event on the GLOBAL CLOCK — it lives in seconds, not in any region's beats.
   It persists across edits, selections, and focus changes; only the transport and the scrub lane move it. */
let playheadSec=0;
function drawPlayhead(W,H){
  const x=secToX(clampSecToContent(playheadSec));
  if(x<GUT_L-5||x>W+5) return;
  ctx.strokeStyle=col('--ember'); ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(x,GUT_T); ctx.lineTo(x,H); ctx.stroke();
  ctx.fillStyle=col('--ember'); ctx.beginPath(); ctx.moveTo(x-4,GUT_T); ctx.lineTo(x+4,GUT_T); ctx.lineTo(x,GUT_T+6); ctx.fill();
}

/* ============================================================
   HIT TESTING
   ============================================================ */
function noteAt(px,py){
  try{
  for(let i=notes.length-1;i>=0;i--){ const n=notes[i]; _ctxRegion=regionById(n.region);
    const x0=beatToX(n.start), x1=beatToX(n.start+n.dur);
    if(px<x0-6||px>x1+6) continue;
    if(n.type==='hold'){ const y=hzToY(pitchAt(n,0)); if(Math.abs(py-y)<=Math.max(6,view.pxPerSemi*0.5)) return n; }
    else { const f=Math.max(0,Math.min(1,(px-x0)/Math.max(1,x1-x0))); const y=hzToY(pitchAt(n,f)); if(Math.abs(py-y)<=7) return n; }
  }
  return null;
  } finally { _ctxRegion=null; }
}
function pointHitIndex(n,px,py){      // index of the breakpoint under cursor, or -1
  for(let i=0;i<n.pts.length;i++){
    const x=beatToX(n.start+n.pts[i].t*n.dur), y=hzToY(n.pts[i].hz);
    if(Math.hypot(px-x,py-y)<8) return i;
  }
  return -1;
}
function distToSeg(px,py,ax,ay,bx,by){
  const dx=bx-ax, dy=by-ay; const L2=dx*dx+dy*dy||1e-9;
  let t=((px-ax)*dx+(py-ay)*dy)/L2; t=Math.max(0,Math.min(1,t));
  const cx=ax+t*dx, cy=ay+t*dy;
  return {dist:Math.hypot(px-cx,py-cy), t};
}
// nearest point on a note's rendered contour: {dist, seg, frac}
function curveHit(n,px,py){
  const x0=beatToX(n.start), x1=beatToX(n.start+Math.max(n.dur,1e-4));
  if(n.pts.length<=1){ const y=hzToY(pitchAt(n,0)); const cx=Math.max(x0,Math.min(x1,px));
    return {dist:Math.hypot(px-cx,py-y), seg:0, frac:0}; }
  const samples=Math.max(8,Math.ceil((x1-x0)/2));
  let best={dist:Infinity,frac:0}, prevx=null,prevy=null,prevf=0;
  for(let s=0;s<=samples;s++){ const f=s/samples; const x=x0+(x1-x0)*f; const y=hzToY(pitchAt(n,f));
    if(prevx!=null){ const dd=distToSeg(px,py,prevx,prevy,x,y); if(dd.dist<best.dist){ best.dist=dd.dist; best.frac=prevf+(f-prevf)*dd.t; } }
    prevx=x;prevy=y;prevf=f;
  }
  let seg=0; for(let i=0;i<n.pts.length-1;i++){ if(best.frac>=n.pts[i].t-1e-9 && best.frac<=n.pts[i+1].t+1e-9){ seg=i; break; } }
  return {dist:best.dist, seg:Math.max(0,Math.min(n.pts.length-2,seg)), frac:best.frac};
}
const HIT_THIN=3.5, HIT_AURA=11;   // crisp center line = segment · soft aura = whole note
function selectHit(px,py){
  try{
  for(let i=notes.length-1;i>=0;i--){ const n=notes[i]; _ctxRegion=regionById(n.region);
    const x0=beatToX(n.start), x1=beatToX(n.start+Math.max(n.dur,1e-4));
    if(px<x0-HIT_AURA||px>x1+HIT_AURA) continue;
    if(n.type==='hold'){
      const y=hzToY(pitchAt(n,0));
      if(py<y-HIT_AURA||py>y+HIT_AURA) continue;
      const he=holdEdge(n,px);                       // x near start or end handle
      if(he) return {note:n,kind:'point',idx:(he==='start'?0:1),edge:he};
      const ch=curveHit(n,px,py); if(ch.dist<=HIT_AURA) return {note:n,kind:'note'};
      continue;
    }
    const pi=pointHitIndex(n,px,py); if(pi>=0) return {note:n,kind:'point',idx:pi};
    const ch=curveHit(n,px,py);
    if(ch.dist<=HIT_THIN) return {note:n,kind:'segment',seg:ch.seg};
    if(ch.dist<=HIT_AURA) return {note:n,kind:'note'};
  }
  return null;
  } finally { _ctxRegion=null; }
}

/* ============================================================
   POINTER INTERACTION
   ============================================================ */
let drag=null;
function evtPos(e){ const r=cv.getBoundingClientRect(); return {x:e.clientX-r.left, y:e.clientY-r.top}; }

cv.addEventListener('pointerdown',e=>{
  cv.setPointerCapture(e.pointerId); dragHist=null;
  const p=evtPos(e); if(p.x<GUT_L||p.y<GUT_T){ // ruler drag = scroll
    drag={mode:'scrollGutter', sx:p.x, sy:p.y, ox:view.scrollX, oy:view.scrollY, axis:p.y<GUT_T?'x':'y'}; return;
  }
  const t=view.tool;
  if(t==='pan'||e.button===1||spaceDown){ drag={mode:'pan',sx:p.x,sy:p.y,ox:view.scrollX,oy:view.scrollY}; stage.classList.add('tool-pan'); return; }

  // playhead grip: the triangle at the top of the line — drag to scrub (audio pauses while held, resumes on release)
  { const px=secToX(clampSecToContent(playheadSec));
    if(Math.abs(p.x-px)<=6 && p.y<=GUT_T+14){ beginScrub(); drag={mode:'playhead'}; seekTo(xToSec(p.x)); return; } }

  // boundary merge handles: grab a region edge to cannibalize the neighbor (snap differs per handle)
  { const bh=boundaryHandleAt(p); if(bh){ const prev = bh.mode==='end' ? regions.reduce((s,r)=>s+regionSecLen(r),0) : regionStartSec(regions[bh.i+1]);
      drag={mode:'boundary', i:bh.i, snap:bh.mode, preview:prev}; return; } }
  // tuning boundaries: slide a pitch divider in time (notes never move — pitch regions hang on seconds)
  { const pb=pitchBoundaryAt(p); if(pb!=null){ drag={mode:'pitchBoundary', i:pb, preview:pitchRegions[pb].startSec}; return; } }

  // contiguous canvas: clicking into a region focuses it (its looks show); editing continues in it
  { const r=regionAtX(p.x); if(r && r.id!==activeRegionId) focusRegion(r.id);
    const pr=pitchRegionAtSec(xToSec(p.x)); if(pr && pr.id!==activePitchRegionId) focusPitchRegion(pr.id); }

  if(t==='slice'){ const r=regionAtX(p.x); if(!r) return;
    if(selBand==='box'){ flash('box band doesn\u2019t slice \u2014 pick time, pitch, or region'); return; }
    const snappedBeat=snapBeat(xToBeat(p.x));
    const snappedSec=beatToSecIn(snappedBeat, activeRegion());
    if(selBand==='vertical'||selBand==='region'){ splitRegionAt(r, snappedBeat); }
    if(selBand==='horizontal'||selBand==='region'){ splitPitchAt(snappedSec); }
    return; }

  // PEN: click to place successive points (double-click / Enter / Esc to finish)
  if(t==='pen'){
    const hz=snapPitchHzAt(yToHz(p.y), xToSec(p.x));
    const penHome = penNote ? regionById(penNote.region) : activeRegion();
    let beat=xToBeatSnappedIn(p.x, penHome);
    if(!penNote){
      pushHistory();
      penRaw=[{beat,hz}];
      penNote={id:NID++, start:beat, dur:0.0001, type:'glide', curve:depositCurve, vel:+vel.value||96, voice:1, pts:[{t:0,hz}]};
      notes.push(penNote); penNote.voice=autoVoice(penNote);
      selection.clear(); selection.add(penNote.id);
    } else {
      // clicking on/near the last point finishes the path (also handles the 2nd click of a double-click)
      const lp=penRaw[penRaw.length-1];
      const lx=beatToX(penNote.start+penNote.pts[penNote.pts.length-1].t*penNote.dur), ly=hzToY(lp.hz);
      if(Math.hypot(p.x-lx,p.y-ly)<9){ finalizePen(); return; }
      if(beat<=lp.beat) beat=lp.beat + gridStepUnits(mainSystem(regionById(penNote.region)));   // keep time monotonic
      beat=clampBeatIn(beat, penHome);
      penRaw.push({beat,hz}); rebuildPoints(penNote,penRaw); penNote.voice=autoVoice(penNote);
    }
    changed(); return;
  }

  const hit=noteAt(p.x,p.y);
  if(t==='erase'){ if(hit){ pushHistory(); notes=notes.filter(n=>n!==hit); selection.delete(hit.id); changed(); } return; }

  // ▣ SELECT — black arrow: WHOLE-NOTE (object) level only. Never grabs a lone point/segment.
  if(t==='select'){
    dragHist=histSnapshot();                              // capture pre-state; committed on pointerup if notes change
    const h=selectHit(p.x,p.y);
    const mode = e.shiftKey ? 'include' : (e.altKey ? 'exclude' : selMode);
    const isEnd = h && h.kind==='point' && (h.note.type==='hold' || h.idx===0 || h.idx===h.note.pts.length-1);
    if(h && (mode==='include'||mode==='exclude')){        // set-op on the WHOLE note
      segSel=null; pointSel=null; ptSel=new Map();
      if(mode==='exclude') selection.delete(h.note.id); else selection.add(h.note.id);
      tempoSel.clear();
      drag = (mode==='include' && selection.size>0) ? startGroupMove(p) : null;
      changed(); return;
    }
    if(h){
      ptSel=new Map(); segSel=null; pointSel=null; tempoSel.clear();
      if(isEnd){                                          // end-handle → TIME-ONLY resize (pitch frozen, fork (i))
        if(!selection.has(h.note.id)) selection.clear();
        selection.add(h.note.id);
        drag={mode:'resize', freezePitch:true, note:h.note, ptIdx:(h.note.type==='hold'?0:h.idx),
              ep:(h.note.type==='hold'?(h.edge||holdEdge(h.note,p.x)):null), sx:p.x, sy:p.y, o:snapshot(h.note)};
      } else if(selection.size>1 && selection.has(h.note.id)){   // grab & move the whole multi-note selection
        drag=startGroupMove(p);
      } else {                                            // single whole-note move (rigid, all points)
        if(!selection.has(h.note.id)) selection.clear();
        selection.add(h.note.id);
        drag={mode:'move', note:h.note, sx:p.x, sy:p.y, o:snapshot(h.note)};
      }
    } else {
      const marqMode = (mode==='exclude') ? 'subtract' : (mode==='include' ? 'add' : 'replace');
      if(marqMode==='replace'){ clearGran(); tempoSel.clear(); }
      drag={mode:'marquee',sx:p.x,sy:p.y,x2:p.x,y2:p.y,marqMode,band:selBand,whole:true};  // marquee selects WHOLE notes
    }
    changed(); return;
  }

  // ⋯ POINT — white arrow: sub-object. Hit-kind disambiguates (vector-pen convention).
  if(t==='point'){
    dragHist=histSnapshot();
    const h=selectHit(p.x,p.y);
    const mode = e.shiftKey ? 'include' : (e.altKey ? 'exclude' : selMode);
    if(h && (mode==='include'||mode==='exclude')){        // set-op on the hit entity's points
      segSel=null; pointSel=null;
      mergeSel(h.note, new Set(entityIndices(h)), mode==='exclude'?'sub':'add');
      drag = (mode==='include' && (ptSel.size>0||selection.size>0)) ? startGroupMove(p) : null;
      changed(); return;
    }
    if(h && h.kind==='point'){                            // select + move this point (full time+pitch)
      const multi = ptSel.size>0 || selection.size>1;
      const hitInSel = ptSelHas(h.note,h.idx)||selection.has(h.note.id);
      if(multi && hitInSel){ segSel=null; pointSel=null; drag=startGroupMove(p); }
      else {
        ptSel=new Map(); tempoSel.clear(); segSel=null;
        if(!selection.has(h.note.id)) selection.clear();
        selection.add(h.note.id);
        pointSel={note:h.note, idx:(h.note.type==='hold'?0:h.idx)};
        drag={mode:'resize', freezePitch:false, note:h.note, ptIdx:h.idx,
              ep:(h.note.type==='hold'?(h.edge||holdEdge(h.note,p.x)):null), sx:p.x, sy:p.y, o:snapshot(h.note)};
      }
      changed(); return;
    }
    if(h && (h.kind==='segment'||h.kind==='note') && h.note.type!=='hold'){   // ghost-add on the curve body
      const hit=h.note;
      const t2=Math.max(0.0001,Math.min(0.9999,(xToBeatIn(p.x,regionById(hit.region))-hit.start)/Math.max(1e-6,hit.dur)));
      const hz=snapPitchHzAt(yToHz(p.y), xToSec(p.x));
      let i=0; while(i<hit.pts.length && hit.pts[i].t<t2) i++;
      const np={t:t2,hz,curve:depositCurve}; const A=(i>0)?hit.pts[i-1]:null; const orig=A?segCurve(hit,i-1):(hit.curve||'linear');
      hit.pts.splice(i,0,np); applyAffect(A,np,orig);      // tentative insert; same held drag repositions it, release commits
      ptSel=new Map(); segSel=null; tempoSel.clear();
      selection.clear(); selection.add(hit.id);
      pointSel={note:hit, idx:i};
      drag={mode:'resize', freezePitch:false, note:hit, ptIdx:i, ep:null, sx:p.x, sy:p.y, o:snapshot(hit), ghost:{note:hit,idx:i}};
      changed(); return;
    }
    // empty (or a bare hold body) → marquee point-selection
    const marqMode = (mode==='exclude') ? 'subtract' : (mode==='include' ? 'add' : 'replace');
    if(marqMode==='replace'){ clearGran(); tempoSel.clear(); }
    drag={mode:'marquee',sx:p.x,sy:p.y,x2:p.x,y2:p.y,marqMode,band:selBand};
    changed(); return;
  }

  // creation tools
  dragHist=histSnapshot();
  const beat=xToBeatSnappedIn(p.x, activeRegion());
  const hz=snapPitchHzAt(yToHz(p.y), xToSec(p.x));
  if(t==='hold'){
    const n={id:NID++, start:beat, dur:settings.defLen, type:'hold', vel:+vel.value||96, voice:1, pts:[{t:0,hz}]};
    notes.push(n); n.voice=autoVoice(n); selection.clear(); selection.add(n.id);
    drag={mode:'newHoldLen', note:n, sx:p.x, baseStart:beat};
  } else if(t==='glide'){
    const n={id:NID++, start:beat, dur:Math.max(0.0625,settings.defLen), type:'glide', curve:depositCurve,
             vel:+vel.value||96, voice:1, pts:[{t:0,hz},{t:1,hz}]};
    notes.push(n); n.voice=autoVoice(n); selection.clear(); selection.add(n.id);
    drag={mode:'newGlide', note:n, sx:p.x, sy:p.y, baseStart:beat, startHz:hz};
  } else if(t==='free'){
    const n={id:NID++, start:beat, dur:0.0001, type:'free', vel:+vel.value||96, voice:1, pts:[{t:0,hz}]};
    notes.push(n); n.voice=autoVoice(n); selection.clear(); selection.add(n.id);
    drag={mode:'newFree', note:n, baseStart:beat, raw:[{beat,hz}]};
  }
  changed();
});

// pen helper: rebuild normalized pts from absolute [{beat,hz}] (no decimation — exact points)
function rebuildPoints(note,raw){
  const start=raw[0].beat; let end=raw[raw.length-1].beat;
  if(end<=start) end=start+0.0001;
  note.start=start; note.dur=end-start;
  note.pts = raw.length<2 ? [{t:0,hz:raw[0].hz}] : raw.map(q=>({t:(q.beat-start)/(end-start), hz:q.hz}));
}
function finalizePen(){
  if(!penNote) return;
  if(penNote.pts.length<2){ notes=notes.filter(n=>n!==penNote); selection.delete(penNote.id); }
  penNote=null; penRaw=null; changed();
}

function holdEdge(n,px){ const prev=_ctxRegion; _ctxRegion=regionById(n.region);
  try{ const x1=beatToX(n.start+n.dur); if(Math.abs(px-x1)<7) return 'end'; const x0=beatToX(n.start); if(Math.abs(px-x0)<7) return 'start'; return null; }
  finally{ _ctxRegion=prev; } }
function snapshot(n){ return JSON.parse(JSON.stringify(n)); }
function startGroupMove(p){
  const targets=new Map();
  for(const id of selection){ const n=notes.find(x=>x.id===id); if(n) targets.set(n, new Set(n.pts.map((_,i)=>i))); }
  for(const [n,set] of ptSel){ const ex=targets.get(n)||new Set(); for(const i of set) ex.add(i); targets.set(n,ex); }
  const snap=new Map(); let leadSec=null, leadDx=Infinity;
  for(const [n,set] of targets){ const home=regionById(n.region);
    const abs=n.pts.map(q=>({beat:n.start+q.t*n.dur, hz:q.hz, curve:q.curve}));
    snap.set(n,{sel:set, abs});
    for(const i of set){ const aSec=beatToSecIn(abs[i].beat, home); const dx=Math.abs(secToX(aSec)-p.x);
      if(dx<leadDx){ leadDx=dx; leadSec=aSec; } }   // leader = the selected point nearest the grab
  }
  return {mode:'ptMove', sx:p.x, sy:p.y, targets:snap, leadSec};
}
function removePoints(note,idxSet){     // returns false if the note should be removed entirely
  const abs=note.pts.map(q=>({beat:note.start+q.t*note.dur, hz:q.hz, curve:q.curve}));
  const kept=abs.filter((_,i)=>!idxSet.has(i));
  if(kept.length<1) return false;
  if(kept.length===1){ note.type='hold'; note.start=kept[0].beat; if(!(note.dur>0)) note.dur=settings.defLen; note.pts=[{t:0,hz:kept[0].hz}]; return true; }
  const start=Math.min(...kept.map(q=>q.beat)), end=Math.max(...kept.map(q=>q.beat)), dur=Math.max(1e-4,end-start);
  note.start=start; note.dur=dur;
  note.pts=kept.map(q=>{ const o={t:(q.beat-start)/dur, hz:q.hz}; if(q.curve) o.curve=q.curve; return o; });
  if(note.type==='hold') note.type='glide';
  return true;
}
function deleteSelection(){
  if(!selection.size && !ptSel.size) return;
  pushHistory();
  if(selection.size) notes=notes.filter(n=>!selection.has(n.id));
  for(const [n,set] of ptSel){ if(!notes.includes(n)) continue; if(!removePoints(n,set)) notes=notes.filter(x=>x!==n); }
  clearGran();
}
function clampBeatToContent(b){ return clampBeatIn(b, activeRegion()); }   // content-wide (all regions), in active units
// voice = lowest positive integer whose notes don't overlap this one's time-span ("y-axis intersection")
function overlap(aS,aE,bS,bE){ return aS < bE-1e-9 && bS < aE-1e-9; }
function autoVoice(note){
  const s=note.start, e=note.start+Math.max(note.dur,1e-4);
  let v=1;
  while(v<=128){ let clash=false;
    for(const n of notes){ if(n===note) continue; if((n.voice||1)===v && overlap(s,e,n.start,n.start+Math.max(n.dur,1e-4))){ clash=true; break; } }
    if(!clash) return v; v++;
  }
  return v;
}

cv.addEventListener('pointermove',e=>{
  const p=evtPos(e);
  lastMouse.x=p.x; lastMouse.y=p.y; lastMouse.inside=(p.x>=GUT_L && p.y>=GUT_T);
  // hover cursor feedback for select endpoints
  if(!drag){ hoverFeedback(p); return; }
  const d=drag;
  if(d.mode==='pan'){ view.scrollX=d.ox-(p.x-d.sx); view.scrollY=d.oy-(p.y-d.sy); clampScroll(); draw(); return; }
  if(d.mode==='playhead'){ seekTo(xToSec(p.x)); return; }
  if(d.mode==='scrollGutter'){ if(d.axis==='x') view.scrollX=d.ox-(p.x-d.sx); else view.scrollY=d.oy-(p.y-d.sy); clampScroll(); draw(); return; }
  if(d.mode==='boundary'){ d.preview=snapBoundarySec(xToSec(p.x), d.i, d.snap); draw();
    const x=secToX(d.preview); ctx.save(); ctx.strokeStyle=col('--ember'); ctx.lineWidth=2; ctx.setLineDash([4,3]);
    ctx.beginPath(); ctx.moveTo(x,GUT_T); ctx.lineTo(x,cv.clientHeight); ctx.stroke(); ctx.restore(); return; }
  if(d.mode==='pitchBoundary'){
    const lo=pitchRegions[d.i-1].startSec+0.05;
    const hi=((d.i+1<pitchRegions.length)?pitchRegions[d.i+1].startSec:totalSec())-0.05;
    d.preview=Math.max(lo,Math.min(hi, snapSecToChart(clampSecToContent(xToSec(p.x)))));   // obeys the time snap of the region it's in, like notes
    draw();
    const x=secToX(d.preview); ctx.save(); ctx.strokeStyle=col('--ember'); ctx.lineWidth=1.5; ctx.setLineDash([0.5,5]); ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(x,GUT_T); ctx.lineTo(x,cv.clientHeight); ctx.stroke(); ctx.restore(); return; }

  if(d.mode==='newHoldLen'){ const b=xToBeatSnappedIn(p.x, regionById(d.note.region)); d.note.dur=Math.max(gridStepUnits(mainSystem(regionById(d.note.region))), b-d.baseStart || settings.defLen); if(d.note.dur<=0) d.note.dur=settings.defLen; d.note.voice=autoVoice(d.note); draw(); updateStatus(); return; }
  if(d.mode==='newGlide'){
    const b=xToBeatSnappedIn(p.x, regionById(d.note.region)); const hz=snapPitchHzAt(yToHz(p.y), xToSec(p.x));
    d.note.dur=Math.max(gridStepUnits(mainSystem(regionById(d.note.region))), Math.abs(b-d.baseStart)||settings.defLen);
    if(b<d.baseStart){ d.note.start=b; d.note.pts=[{t:0,hz},{t:1,hz:d.startHz}]; }
    else { d.note.start=d.baseStart; d.note.pts=[{t:0,hz:d.startHz},{t:1,hz}]; }
    d.note.voice=autoVoice(d.note); draw(); updateStatus(); return;
  }
  if(d.mode==='newFree'){
    const b=xToBeatClampedIn(p.x, regionById(d.note.region)); const hz=snapPitchHzAt(yToHz(p.y), xToSec(p.x));
    if(b>d.baseStart){ d.raw.push({beat:b,hz}); rebuildFree(d.note,d.raw); d.note.voice=autoVoice(d.note); }
    draw(); updateStatus(); return;
  }
  if(d.mode==='ptMove'){
    const rawDm=-(p.y-d.sy)/view.pxPerSemi;
    const rawDs=(p.x-d.sx)/view.pxPerSec;                                         // cursor motion in SECONDS (the shared numéraire)
    // leader-snap: the grabbed point lands on a gridline; the whole group follows by that one seconds delta
    let dSec=(settings.snapTime && d.leadSec!=null)
      ? snapSecToChart(clampSecToContent(d.leadSec+rawDs)) - d.leadSec
      : rawDs;
    let loS=-Infinity, hiS=Infinity;
    for(const [n,t] of d.targets){ const home=regionById(n.region), u=upsOf(home);
      const abs=t.abs, sel=t.sel, last=abs.length-1, minStepS=(1/Math.max(settings.grid,8))/u;   // guard-only, flat is fine
      for(let i=0;i<abs.length;i++){ if(!sel.has(i)) continue;
        const aS=beatToSecIn(abs[i].beat, home);
        hiS=Math.min(hiS, totalSec()-aS); loS=Math.max(loS, -aS);
        if(i<last && !sel.has(i+1)) hiS=Math.min(hiS, beatToSecIn(abs[i+1].beat,home)-aS-minStepS);
        if(i>0   && !sel.has(i-1)) loS=Math.max(loS, -(aS-beatToSecIn(abs[i-1].beat,home)-minStepS));
      }
    }
    dSec=Math.max(loS,Math.min(hiS,dSec));
    for(const [n,t] of d.targets){ const home=regionById(n.region); const abs=t.abs, sel=t.sel;
      const na=abs.map((a,i)=>{ if(!sel.has(i)) return {beat:a.beat, hz:a.hz, curve:a.curve};
        const nsec=beatToSecIn(a.beat, home)+dSec, nb=secToBeatIn(nsec, home);    // move rigidly in seconds, re-enter the chart
        const hzRaw=midiToFreq(freqToMidi(a.hz,settings.a4)+rawDm,settings.a4);
        return {beat:nb, hz:snapPitchHzAt(hzRaw, nsec), curve:a.curve}; });
      const start=Math.min(...na.map(q=>q.beat)), end=Math.max(...na.map(q=>q.beat)), dur=Math.max(1e-4,end-start);
      n.start=start; n.dur=dur;
      n.pts=na.map(q=>{ const o={t:(q.beat-start)/dur, hz:q.hz}; if(q.curve) o.curve=q.curve; return o; });
    }
    draw(); updateStatus(); return;
  }
  if(d.mode==='move'){
    const home=regionById(d.note.region);
    const ds=(p.x-d.sx)/view.pxPerSec, dm=-(p.y-d.sy)/view.pxPerSemi;
    let sSec=beatToSecIn(d.o.start, home)+ds;                   // note-start in SECONDS + drag (start is the leader)
    sSec=snapSecToChart(sSec);                                  // differential snap: the grid under the start (curve-aware)
    // keep the metric content (dur in beats) invariant; clamp start so the note stays on content
    const endBeat=secToBeatIn(totalSec(), home), startFloor=secToBeatIn(0, home);
    let nStart=secToBeatIn(sSec, home);
    nStart=Math.max(startFloor, Math.min(endBeat-d.o.dur, nStart));
    d.note.start=nStart;                                        // stored in HOME units; deriveHang re-homes on release
    const shift=settings.snapPitch?Math.round(dm):dm;
    d.note.pts=d.o.pts.map(q=>{ const o={t:q.t, hz:midiToFreq(freqToMidi(q.hz,settings.a4)+shift,settings.a4)}; if(q.curve) o.curve=q.curve; return o; });
    draw(); updateStatus(); return;
  }
  if(d.mode==='segMove'){
    const n=d.note, seg=d.seg, last=d.absPts.length-1;
    const home=regionById(n.region);
    const rawDs=(p.x-d.sx)/view.pxPerSec, rawDm=-(p.y-d.sy)/view.pxPerSemi;   // SECONDS delta (px/beat varies under a curve)
    // proposed new absolute positions for the two endpoints — snap each in seconds, then back to home beats
    const mk=(i)=>{
      const sec=clampSecToContent(snapSecToChart(clampSecToContent(beatToSecIn(d.absPts[i].beat, home)+rawDs)));
      let beat=clampBeatIn(secToBeatIn(sec, home), home);
      let hz=snapPitchHzAt(midiToFreq(freqToMidi(d.absPts[i].hz,settings.a4)+rawDm,settings.a4), sec);
      return {beat,hz,curve:d.absPts[i].curve};
    };
    const a=d.absPts.map(q=>({beat:q.beat,hz:q.hz,curve:q.curve}));
    a[seg]=mk(seg); a[seg+1]=mk(seg+1);
    const minStep=1/Math.max(settings.grid,8);
    if(seg>0) a[seg].beat=Math.max(a[seg].beat, a[seg-1].beat+minStep);
    if(seg+1<last) a[seg+1].beat=Math.min(a[seg+1].beat, a[seg+2].beat-minStep);
    if(a[seg+1].beat<=a[seg].beat) a[seg+1].beat=a[seg].beat+minStep;   // keep time increasing
    const start=Math.min(...a.map(q=>q.beat)), end=Math.max(...a.map(q=>q.beat)), dur=Math.max(1e-4,end-start);
    n.start=start; n.dur=dur;
    n.pts=a.map(q=>{ const o={t:(q.beat-start)/dur, hz:q.hz}; if(q.curve) o.curve=q.curve; return o; });
    draw(); updateStatus(); return;
  }
  if(d.mode==='resize'){
    const n=d.note, home=regionById(n.region);
    if(n.type==='hold'){
      if(d.ep==='end'){ const b=xToBeatSnappedIn(p.x,home); n.dur=Math.max(gridStepUnits(mainSystem(home)),b-n.start); }
      else { const b=xToBeatSnappedIn(p.x,home); const end=d.o.start+d.o.dur; n.start=Math.min(b,end-gridStepUnits(mainSystem(home))); n.dur=end-n.start; }
    } else {
      const idx=d.ptIdx, last=n.pts.length-1;
      const hz = d.freezePitch ? null : snapPitchHzAt(yToHz(p.y), xToSec(p.x));   // select-tool end-resize freezes pitch
      const b=xToBeatSnappedIn(p.x,home);
      if(idx===0){ const end=d.o.start+d.o.dur; n.start=Math.min(b,end-gridStepUnits(mainSystem(home))); n.dur=end-n.start; if(hz!=null) n.pts[0]={...n.pts[0],hz}; }
      else if(idx===last){ n.dur=Math.max(gridStepUnits(mainSystem(home)),b-n.start); if(hz!=null) n.pts[last]={...n.pts[last],hz}; }
      else { // interior point — move in (t,hz) between its neighbors, note extent unchanged
        let nt=(b-n.start)/Math.max(1e-6,n.dur);
        nt=Math.max(n.pts[idx-1].t+1e-4, Math.min(n.pts[idx+1].t-1e-4, nt));
        n.pts[idx] = hz!=null ? {...n.pts[idx], t:nt, hz} : {...n.pts[idx], t:nt};
      }
    }
    draw(); updateStatus(); return;
  }
  if(d.mode==='marquee'){ d.x2=p.x; d.y2=p.y; draw(); drawMarquee(d); return; }
});

function rebuildFree(note,raw){
  // raw: [{beat,hz}] increasing beat; decimate then normalize to t in 0..1
  const start=raw[0].beat; let end=raw[raw.length-1].beat;
  if(end<=start) end=start+0.0001; note.start=start; note.dur=end-start;
  // decimate by min beat spacing
  const minStep=(end-start)/120;
  const dec=[raw[0]]; for(let i=1;i<raw.length;i++){ if(raw[i].beat-dec[dec.length-1].beat>=minStep) dec.push(raw[i]); }
  if(dec[dec.length-1]!==raw[raw.length-1]) dec.push(raw[raw.length-1]);
  note.pts=dec.map(q=>({t:(q.beat-start)/(end-start), hz:q.hz}));
  if(note.pts.length<2) note.pts=[{t:0,hz:raw[0].hz},{t:1,hz:raw[0].hz}];
}

}

function marqueeRect(d, forDraw){
  let x=Math.min(d.sx,d.x2), y=Math.min(d.sy,d.y2), w=Math.abs(d.x2-d.sx), h=Math.abs(d.y2-d.sy);
  const band=d.band||'box';
  if(band==='vertical'){          // time span — pin pitch axis to full extent
    if(forDraw){ y=GUT_T; h=Math.max(0,cv.clientHeight-GUT_T); } else { y=-1e6; h=2e6; }
  } else if(band==='horizontal'){ // pitch span — pin time axis to full extent
    if(forDraw){ x=GUT_L; w=Math.max(0,cv.clientWidth-GUT_L); } else { x=-1e6; w=2e6; }
  } else if(band==='region'){     // whole regions — x snaps out to the regions touched, y pinned to full extent
    const sA=Math.max(0,clampSecToContent(xToSec(Math.min(d.sx,d.x2)))-1e-9);
    const sB=Math.max(0,clampSecToContent(xToSec(Math.max(d.sx,d.x2)))-1e-9);
    const rA=regionAtSec(sA), rB=regionAtSec(sB);
    const x0=secToX(regionStartSec(rA)), x1=secToX(regionStartSec(rB)+regionSecLen(rB));
    x=x0; w=Math.max(0,x1-x0);
    if(forDraw){ y=GUT_T; h=Math.max(0,cv.clientHeight-GUT_T); } else { y=-1e6; h=2e6; }
  }
  return {x,y,w,h};
}
function drawMarquee(d){
  const {x,y,w,h}=marqueeRect(d,true);
  ctx.save(); ctx.strokeStyle=col('--tide'); ctx.fillStyle='rgba(17,137,126,0.08)'; ctx.lineWidth=1;
  ctx.fillRect(x,y,w,h); ctx.strokeRect(x+.5,y+.5,w,h); ctx.restore();
}
function commitMarquee(d){
  const {x,y,w,h}=marqueeRect(d,false);
  const band=d.band||'box', sweptW=Math.abs(d.x2-d.sx), sweptH=Math.abs(d.y2-d.sy);
  if(band==='box'   && sweptW<3 && sweptH<3) return;   // require a real sweep on the active axis
  if(band==='vertical'   && sweptW<3) return;
  if(band==='horizontal' && sweptH<3) return;
  // region band: even a bare click selects everything in the region under it — no sweep required
  const mode=d.marqMode||'replace';
  if(mode==='replace'){ selection.clear(); ptSel=new Map(); }
  segSel=null; pointSel=null;
  const op = (mode==='subtract') ? 'sub' : 'add';          // replace + add both union (replace pre-cleared)
  // collect point indices hit by an intersected segment (curve), then merge — each note tested in its own chart
  try{
  for(const n of notes){
    _ctxRegion=regionById(n.region);
    const nx0=beatToX(n.start), nx1=beatToX(n.start+Math.max(n.dur,1e-4));
    if(nx1<x-2||nx0>x+w+2) continue;
    let hit=new Set();
    if(n.type==='hold'){ const yy=hzToY(pitchAt(n,0)); if(lineVsRect(nx0,yy,nx1,yy,x,y,w,h)) hit.add(0); }
    else { for(let i=0;i<n.pts.length-1;i++) if(segHitsRect(n,i,x,y,w,h)){ hit.add(i); hit.add(i+1); } }
    if(!hit.size) continue;
    if(d.whole){ if(op==='sub') selection.delete(n.id); else selection.add(n.id); }   // select-tool marquee = whole notes
    else mergeSel(n, hit, op);
  }
  } finally { _ctxRegion=null; }
}

/* ---- wheel: scroll / zoom ---- */
cv.addEventListener('wheel',e=>{
  e.preventDefault();
  if(e.ctrlKey||e.metaKey){
    const p=evtPos(e); const f=e.deltaY<0?1.12:1/1.12;
    // zoom both, keep cursor anchored
    const beatAt=xToBeat(p.x), midiAt=yToMidi(p.y);
    view.pxPerSec=clamp(view.pxPerSec*f,16,4000);
    view.pxPerSemi=clamp(view.pxPerSemi*f,3,60);
    view.scrollX = (beatAt*view.pxPerBeat) - (p.x-GUT_L);
    view.scrollY = (view.midiMax-midiAt)*view.pxPerSemi - (p.y-GUT_T);
    clampScroll(); draw();
  } else if(e.shiftKey){ view.scrollX+=e.deltaY; clampScroll(); draw(); }
  else { view.scrollY+=e.deltaY; view.scrollX+=e.deltaX; clampScroll(); draw(); }
},{passive:false});

function parseScl(text){
  const lines=text.split(/\r?\n/); let state='desc', desc=null, count=null; const data=[];
  for(const raw of lines){ const line=raw.trim();
    if(line.startsWith('!')) continue;
    if(state==='desc'){ desc=raw.trim(); state='count'; continue; }
    if(line==='') continue;
    if(state==='count'){ count=parseInt(line,10); state='pitch'; continue; }
    const tok=line.split(/\s+/)[0]; let cents;
    if(tok.includes('.')) cents=parseFloat(tok);
    else if(tok.includes('/')){ const [a,b]=tok.split('/').map(Number); cents=1200*Math.log2(a/b); }
    else cents=1200*Math.log2(parseFloat(tok));
    if(isFinite(cents)) data.push(cents);
  }
  if(data.length<1) throw new Error('no pitches');
  const periodCents=data[data.length-1];
  const degreesCents=[0].concat(data.slice(0,-1));
  return { name:(desc&&desc.length?desc:null), degreesCents, periodCents };
}

function setActiveCycle(id){ if(!CYCLES[id]) return;
  const c=CYCLES[id];
  if(c.kind==='grammar' && !c.grammar){ try{ c.grammar=parseCyc2(c.src); }catch(e){ flash('grammar error: '+e.message); return; } }
  activeCycleId=id; activeCycle=c; cycleSel.value=id;
  // span hint: a host-calibration suggestion (from "! sig:" or a builtin) — the .cyc itself stays span-agnostic
  const m=mainSystem();
  if(c.sigHint && m.kind!=='chronological' && (Math.abs((m.sigNum||4)-c.sigHint.num)>1e-9 || Math.abs((m.sigDen||4)-c.sigHint.den)>1e-9)){

    relabelActiveRegion(mm=>{ mm.sigNum=c.sigHint.num; mm.sigDen=c.sigHint.den; });
    flash('cycle suggests '+c.sigHint.num+'/'+c.sigHint.den+' \u2014 span applied (notes frozen in seconds)');
  }
  if(c.depthHint) cycDepth.value=Math.max(1,Math.min(7,c.depthHint));

}

/* A .cyc is FLAT (description, count, onset list) or a GRAMMAR (any line starting with @).
   parseCyc auto-detects and returns the matching cycle object.
   "!" lines stay comments to every parser; two are read as optional HOST HINTS:
     ! sig: 7/8        — suggested span calibration (the .cyc cannot know its own duration, by axiom)
     ! beat_depth: 2   — suggested subdivision depth */
function cycHints(text){
  const h={};
  for(const raw of text.split(/\r?\n/)){ const l=raw.trim(); if(!l.startsWith('!')) continue;
    let m=l.match(/^!\s*sig\s*:\s*([\d.]+)\s*\/\s*([\d.]+)/i); if(m && +m[1]>0 && +m[2]>0){ h.sigHint={num:+m[1],den:+m[2]}; continue; }
    m=l.match(/^!\s*beat_depth\s*:\s*(\d+)/i); if(m){ h.depthHint=+m[1]; }
  }
  return h;
}
function parseCyc(text){
  const isGrammar = text.split(/\r?\n/).some(l=>{ const t=l.trim(); return t && !t.startsWith('!') && t[0]==='@'; });
  if(isGrammar){ const g=parseCyc2(text); return Object.assign({ name:(g.description&&g.description.length?g.description:null), kind:'grammar', grammar:g, src:text }, cycHints(text)); }
  const lines=text.split(/\r?\n/); let state='desc', desc=null, count=null; const data=[];
  for(const raw of lines){ const line=raw.trim();
    if(line.startsWith('!')) continue;
    if(state==='desc'){ desc=raw.trim(); state='count'; continue; }
    if(line==='') continue;
    if(state==='count'){ count=parseInt(line,10); state='onset'; continue; }
    const tok=line.split(/\s+/)[0]; let frac;
    if(tok.includes('.')) frac=parseFloat(tok);                                  // measured / microtiming
    else if(tok.includes('/')){ const [a,b]=tok.split('/').map(Number); frac=a/b; }  // structural / additive
    else frac=parseFloat(tok);                                                   // bare int (e.g. 1 = the period)
    if(isFinite(frac)) data.push(frac);
  }
  if(data.length<1) throw new Error('no onsets');
  const period=data[data.length-1]||1;                 // last entry closes the cycle
  const onsets=[0].concat(data.slice(0,-1));            // implicit downbeat + listed onsets
  const phasesNorm=onsets.map(p=>p/period);             // normalize to [0,1)
  return Object.assign({ name:(desc&&desc.length?desc:null), phasesNorm, period }, cycHints(text));
}
/* ---- recursive subdivision grammar (the time-domain analog of recursion in tunings) ----
   Rule:  @name: SPEC > CONT   — SPEC = int N (even) | weights | measured points;
   > CONT = one rule for all children | one per child (_=leaf) | omitted (leaves). A rule may self-refer. */
function parseCyc2(text){
  const lines=text.split(/\r?\n/); let desc=null, sawDesc=false; const rules={}; let start=null;
  for(const raw of lines){ const line=raw.trim();
    if(line.startsWith('!')||line==='') continue;
    if(line[0]==='@'){
      const m=line.match(/^@\s*([A-Za-z0-9_-]+)\s*:\s*(.*)$/); if(!m) throw new Error('malformed rule: '+line);
      const name=m[1]; let rhs=m[2]; let cont=null; const gt=rhs.indexOf('>');
      if(gt>=0){ cont=rhs.slice(gt+1).trim().split(/\s+/).filter(Boolean); rhs=rhs.slice(0,gt).trim(); }
      const nums=rhs.split(/\s+/).filter(Boolean).map(Number);
      if(!nums.length||nums.some(n=>!isFinite(n))) throw new Error('bad cut spec in @'+name);
      let weights;
      if(nums.length===1){ const N=nums[0]; if(!Number.isInteger(N)||N<2) throw new Error('@'+name+': single value must be integer ≥2'); weights=Array(N).fill(1/N); }
      else { const s=nums.reduce((a,b)=>a+b,0); if(s<=0) throw new Error('@'+name+': weights sum to 0'); weights=nums.map(n=>n/s); }
      let conts;
      if(!cont) conts=weights.map(()=>null);
      else if(cont.length===1){ const c=cont[0]; conts=weights.map(()=>(c==='_'||c==='.')?null:c); }
      else if(cont.length===weights.length) conts=cont.map(c=>(c==='_'||c==='.')?null:c);
      else throw new Error('@'+name+': '+cont.length+' continuations for '+weights.length+' children');
      rules[name]={weights,conts}; if(start===null) start=name; continue;
    }
    if(!sawDesc){ desc=raw.trim(); sawDesc=true; }
  }
  if(!start) throw new Error('no @rules defined');
  if(rules['root']) start='root';
  for(const [n,r] of Object.entries(rules)) for(const c of r.conts) if(c!==null && !rules[c]) throw new Error('@'+n+' references unknown rule "'+c+'"');
  return {description:desc, rules, start};
}
function cyc2Boundaries(g, maxDepth, cap=40000){
  const acc=new Map(); const put=(p,l)=>{ p=+p.toFixed(9); if(!acc.has(p)||l<acc.get(p)) acc.set(p,l); };
  put(0,0); let count=0;
  (function rec(a,b,rn,depth){ if(rn==null||depth>maxDepth) return; const r=g.rules[rn]; if(!r) return; let x=a;
    for(let i=0;i<r.weights.length;i++){ const w=(b-a)*r.weights[i], cA=x, cB=x+w;
      if(i>0) put(cA,depth); if(++count>cap) return; rec(cA,cB,r.conts[i],depth+1); x=cB; } })(0,1,g.start,1);
  return [...acc.entries()].map(([phase,level])=>({phase,level})).sort((u,v)=>u.phase-v.phase);
}
/* unified: boundaries (phase in [0,1), with metric level) for any active cycle */
function cycleBoundaries(c, depth){
  if(!c || c.isEven) return [{phase:0,level:0}];
  if(c.kind==='grammar' && c.grammar) return cyc2Boundaries(c.grammar, depth);
  const out=[{phase:0,level:0}];
  for(const p of (c.phasesNorm||[])) if(p>0) out.push({phase:p, level:1});   // flat onsets are all level 1
  return out;
}

/* ---- the sig is a cycla front-end ----------------------------------------------------
   The spinners ghost-write the flat grammar regular notation hand-waves: 5/8 IS
   "@root: 5 > bin" over a bar spanning 2.5 quarter-durations. Cycla owns the bar's
   internal division; the sig / =♩ field is the HOST CALIBRATION (one cycle = how much
   clock) that a .cyc, by axiom, refuses to encode. When a non-even cycle is active the
   numerator locks (the cycle owns the division count); span and unit stay live. */
function sigToCyc(){
  let n=settings.sigNum, d=settings.sigDen, pn=n, pd=d;
  for(let i=0;i<6 && Math.abs(pn-Math.round(pn))>1e-9;i++){ pn*=2; pd*=2; }   // 2.5/4 writes as 5/8
  pn=Math.round(pn);
  const head=n+'/'+d+' — generated by Tabota Roll'+(pd!==d?(' (written as '+pn+'/'+pd+')'):'');
  const body= pn>=2 ? '@root: '+pn+' > bin\n@bin: 2 > bin' : '@root: 2 > bin\n@bin: 2 > bin';
  return head+'\n! sig: '+pn+'/'+pd+'\n'+body;
}

  sigSpan.value=+( (settings.sigNum*4/settings.sigDen).toFixed(4) );
  const locked = !!(activeCycle && !activeCycle.isEven);
  sigNum.disabled = locked;
  sigNum.title = locked
    ? 'the active cycle defines the bar\u2019s division \u2014 calibrate its span with =\u2669 or the unit'
    : 'beats per bar (fractional welcome \u2014 5/8 \u2261 2.5/4)';
  sigGhost.title = locked
    ? 'the active cycle\u2019s grammar \u2014 click to copy as .cyc\n\n'+(activeCycle.src||'(flat onset cycle \u2014 no grammar)')
    : 'this signature, ghost-written as cycla \u2014 click to copy as .cyc\n\n'+sigToCyc();
}

/* GOLDEN RULE: the extent (seconds) changes only explicitly — boundary drag or the bars input.
   bpm / sig edits are RELABELINGS: the span stays put, bars remap onto it, notes freeze in seconds. */
function relabelActiveRegion(fn){
  const r=activeRegion(), m=mainSystem(r);
  const secLen=regionSecLen(r), rs=regionStartSec(r);
  const spb=1/unitsPerSec(m);
  const abs=notes.filter(n=>n.region===r.id).map(n=>({n, sec:rs+n.start*spb, endSec:rs+(n.start+(n.dur||0))*spb}));
  const hangPre=new Map();
  for(const n of notes){ if(n.end&&n.end.region===r.id) hangPre.set(n, rs+n.end.beat*spb); }
  fn(m);                                                       // apply the edit (new bpm / sig / kind from controls)
  m.bars = secLen/regUnitSec(m);   // extent conserved: units remap onto it
  const ups2=unitsPerSec(m);
  for(const {n,sec,endSec} of abs){ n.start=(sec-rs)*ups2; n.dur=Math.max(1e-4,(endSec-sec)*ups2); }  // notes frozen in time
  for(const [n,endSec] of hangPre){ n.end.beat=(endSec-rs)*ups2; }                                     // hangs frozen in time too
  applyRegionToControls(r);
}

/* unified curve control — one logical control, retargets to the whole cross-surface selection */
const curveSel=document.getElementById('curveSel');
curveSel.addEventListener('change',()=>{ const v=curveSel.value; if(!v) return; applyCurveToSelection(v); });
function segCurve(note,seg){ return note.pts[seg] && note.pts[seg].curve || note.curve || 'linear'; }

/* ============================================================================
 * Cut-1 unified deposit/curve/affect primitive (kernel proven in Node, 25/25).
 * One write path for note + tempo curves. Curve is unitless (shapeK), so a single
 * union may span both surfaces. Value-axis (Hz/bpm) coupling is NOT in this cut.
 * ========================================================================== */
function curveTargets(){            // every curve-bearing writable across both surfaces, as {get,set}
  const out=[];
  if(segSel && segSel.note.type==='glide'){
    const s=segSel; out.push({ get:()=>segCurve(s.note,s.seg), set:v=>{ s.note.pts[s.seg].curve=v; } });
  } else {
    for(const n of selectedNotes()) if(n.type==='glide')
      out.push({ get:()=>n.curve||'linear', set:v=>{ n.curve=v; n.pts.forEach(p=>{ delete p.curve; }); } }); // whole-note uniform
  }
  const em = (typeof tempoEditMode==='function') ? tempoEditMode() : {mode:'none'};
  if(em.mode==='segment') out.push({ get:()=>em.a.curve||'linear', set:v=>{ em.a.curve=v; } });
  else if(em.mode==='point') out.push({ get:()=>em.pt.curve||'linear', set:v=>{ em.pt.curve=v; } });
  else if(em.mode==='points') for(const p of em.pts) out.push({ get:()=>p.curve||'linear', set:v=>{ p.curve=v; } });
  return out;
}
function curveUniform(ts){ let v=null,first=true; for(const t of ts){ const c=t.get(); if(first){v=c;first=false;} else if(c!==v) return null; } return first?null:v; }
function applyCurveToSelection(v){   // empty selection → set the brush; otherwise write the union
  const ts=curveTargets();
  if(!ts.length){ depositCurve=v; syncCurveControl(); return false; }
  pushHistory(); for(const t of ts) t.set(v);
  if(typeof tempoMapDirty==='function') tempoMapDirty();
  changed(); syncCurveControl(); return true;
}
function syncCurveControl(){          // reflect union value (or brush) into every surfacing of the control
  const ts=curveTargets(); const val=curveUniform(ts);
  const show = ts.length===0 ? depositCurve : val;     // brush when empty; null→'—' when mixed
  if(curveSel && document.activeElement!==curveSel) curveSel.value=(show==null?'':show);
  if(typeof tempoOpen!=='undefined' && tempoOpen && typeof updateTempoReadout==='function') updateTempoReadout(); // lane pill mirror
}
/* surface-agnostic affect: inserting np after predecessor A splits a segment whose current
   resolved curve is `orig`. np must already carry the deposit shape (np.curve=depositCurve). */
function applyAffect(A, np, orig){
  if(depositAffect==='after') return;                                  // np keeps deposit shape; A→np untouched
  if(depositAffect==='neither'){ np.curve=orig; }                      // both halves keep original
  else if(depositAffect==='before'){ if(A) A.curve=depositCurve; np.curve=orig; }    // A→np new, np→B original
  else if(depositAffect==='both'){ if(A) A.curve=depositCurve; np.curve=depositCurve; }
}

/* join selected notes into one glide (connect events end-to-start in time order) */
function joinSelection(){
  const sel=selectedNotes().slice().sort((a,b)=>a.start-b.start);
  if(sel.length<2){ flash('select 2+ notes to join'); return; }
  const start=sel[0].start, end=Math.max(...sel.map(n=>n.start+n.dur)); const dur=Math.max(1e-4,end-start);
  const raw=[];
  for(const n of sel){ const k=n.pts.length<=1?[0]:n.pts.map(p=>p.t);
    for(const tt of k){ const beat=n.start+tt*n.dur; const hz=pitchAt(n, n.pts.length<=1?0:tt); const last=raw[raw.length-1];
      if(last && beat<=last.beat){ if(Math.abs(hz-last.hz)>1e-6) last.hz=hz; continue; } raw.push({beat,hz}); } }
  const joined={id:NID++, type:'glide', curve:sel[0].curve||depositCurve, vel:sel[0].vel, voice:sel[0].voice||1, start, dur,
    pts: raw.map(q=>({t:(q.beat-start)/dur, hz:q.hz}))};
  if(joined.pts.length<2){ flash('cannot join'); return; }
  pushHistory();
  notes=notes.filter(n=>!selection.has(n.id)); notes.push(joined);
  selection.clear(); selection.add(joined.id); changed(); flash(`joined ${sel.length} into one glide`);
}

/* split — inverse of join: break a note at selected interior point(s);
   a wholly-selected multi-point note explodes into one note per segment. */
function splitNoteAt(note, idxs){
  const cut=[0, ...idxs, note.pts.length-1];
  const abs=note.pts.map(q=>({beat:note.start+q.t*note.dur, hz:q.hz, curve:q.curve}));
  const pieces=[];
  for(let k=0;k<cut.length-1;k++){
    const a=cut[k], b=cut[k+1], slice=abs.slice(a,b+1);
    if(slice.length<2) continue;
    const start=slice[0].beat, end=slice[slice.length-1].beat, dur=Math.max(1e-4,end-start);
    const pts=slice.map((q,j)=>{ const o={t:(q.beat-start)/dur, hz:q.hz}; if(q.curve && j<slice.length-1) o.curve=q.curve; return o; });
    pieces.push({id:NID++, start, dur, type:(note.type==='free'?'free':'glide'), curve:note.curve, vel:note.vel, voice:note.voice||1, pts});
  }
  return pieces;
}
function splitSelection(){
  const map=new Map();   // note -> Set(interior split idx)
  for(const id of selection){ const n=notes.find(x=>x.id===id); if(n && n.pts.length>2){ const s=new Set(); for(let i=1;i<n.pts.length-1;i++) s.add(i); map.set(n,s); } }
  for(const [n,set] of ptSel){ const s=map.get(n)||new Set(); for(const i of set) if(i>0 && i<n.pts.length-1) s.add(i); if(s.size) map.set(n,s); }
  if(pointSel && pointSel.idx>0 && pointSel.idx<pointSel.note.pts.length-1){ const n=pointSel.note; const s=map.get(n)||new Set(); s.add(pointSel.idx); map.set(n,s); }
  if(!map.size){ flash('select an interior point (or a whole multi-point note) to split'); return; }
  const newNotes=[]; const remove=new Set();
  for(const [n,set] of map){ const pieces=splitNoteAt(n,[...set].sort((a,b)=>a-b)); if(pieces.length>1){ remove.add(n); newNotes.push(...pieces); } }
  if(!newNotes.length){ flash('nothing to split'); return; }
  pushHistory();
  notes=notes.filter(n=>!remove.has(n)).concat(newNotes);
  clearGran(); selection=new Set(newNotes.map(n=>n.id));
  changed(); flash(`split into ${newNotes.length} notes`);

/* ============================================================
   PLAYBACK — one oscillator per voice (mono within a voice)
   Scheduled on the GLOBAL CLOCK: every note enters as absolute
   seconds through its home chart (noteStartSec / upsOf), so
   per-region tempi, chronological regions, and hybrid ends all
   sound exactly as drawn. Transport model:
     ▶ play   — from the playhead          ⏸ pause — keep the playhead
     ■ stop   — return to where ▶ pressed   scrub  — pause, move, resume
   ============================================================ */
let actx=null, oscs=[], rafId=null, playT0=0, playFromSec=0, stopAt=0, playing=false;
let playAnchorSec=0;          // where ▶ (or the last seek) landed — ■ stop returns here
const playBtn=document.getElementById('play'), stopBtn=document.getElementById('stopBtn'), waveSel=document.getElementById('wave'), loopChk=document.getElementById('loop');
playBtn.onclick=togglePlay;
stopBtn.onclick=stopPlay;
function togglePlay(){ playing?pausePlay():startPlay(); }
function setPlayUI(on){ playBtn.textContent=on?'⏸ pause':'▶ play'; playBtn.classList.toggle('on',on); }
function noteEndSec(n){ return beatToSecIn(n.start+Math.max(n.dur,1e-4), regionById(n.region)); }
function playPosSec(){ return Math.max(playFromSec, Math.min(totalSec(), playFromSec+(actx?actx.currentTime-playT0:0))); }
function startPlay(){
  if(!notes.length) return;
  actx=actx||new (window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended') actx.resume();

function startPlayFrom(fromSec){
  stopPlayInternal();

  const evs=[];
  for(const n of notes){ const s=noteStartSec(n), e=noteEndSec(n); if(e>fromSec+1e-6) evs.push({n,s,e}); }
  if(!evs.length){ playing=false; setPlayUI(false); flash('nothing to play after the playhead'); return; }
  const t0=actx.currentTime+0.08; playT0=t0;
  // group by voice
  const byVoice=new Map();
  for(const ev of evs){ const v=ev.n.voice||1; if(!byVoice.has(v)) byVoice.set(v,[]); byVoice.get(v).push(ev); }
  const nVoices=byVoice.size;
  const master=actx.createGain(); master.gain.value=Math.min(0.28, 0.5/Math.max(1,Math.sqrt(nVoices))); master.connect(actx.destination);
  oscs=[]; let endMax=0;

    const ns=arr.slice().sort((a,b)=>a.s-b.s);
    for(let i=0;i<ns.length;i++){ ns[i].cut=(i<ns.length-1)?Math.min(ns[i].e, ns[i+1].s):ns[i].e; }   // voice-steal in seconds
    const osc=actx.createOscillator(); osc.type=waveSel.value;
    const gain=actx.createGain(); gain.gain.setValueAtTime(0.0001,t0);
    osc.connect(gain); gain.connect(master);
    let last=t0, inited=false;
    for(const ev of ns){
      const n=ev.n, span=Math.max(ev.e-ev.s, 0.02);
      // clip the sounding window to [playhead, steal point]; fractions stay measured against the FULL
      // note span, so a mid-note entry picks the contour up exactly where the playhead stands
      const u0=Math.max(fromSec, ev.s), u1=Math.max(u0+0.02, Math.min(ev.cut, ev.e));
      const st=t0+(u0-fromSec), en=t0+(u1-fromSec);

      if(!inited){ osc.frequency.setValueAtTime(Math.max(20,pitchAt(n,fAt(u0))),t0); inited=true; }
      osc.frequency.setValueAtTime(Math.max(20,pitchAt(n,fAt(u0))),st);

      gain.gain.linearRampToValueAtTime(0.9, st+0.006);

}
function tickPlayhead(){

}
function followPlayhead(){   // page-flip when the moving playhead walks off the right edge (manual scrolls elsewhere are left alone)
  const x=secToX(playheadSec), W=cv.clientWidth;
  if(x>W-24){ view.scrollX=clampSecToContent(playheadSec)*view.pxPerSec-40; clampScroll(); }
}
function stopPlayInternal(){ for(const o of oscs){ try{o.onended=null; o.stop();}catch(e){} } oscs=[]; if(rafId)cancelAnimationFrame(rafId); rafId=null; }
function pausePlay(){ if(!playing) return; playheadSec=playPosSec(); playing=false; stopPlayInternal(); setPlayUI(false); draw(); }
function stopPlay(){ playing=false; stopPlayInternal(); playheadSec=playAnchorSec; setPlayUI(false); draw(); }
waveSel.onchange=()=>{ if(playing){ startPlayFrom(playPosSec()); } };

/* ---- scrub: shared by the canvas grip and the scrub lane.
   Audio pauses while held; the seek point becomes the new stop anchor; resumes on release. ---- */
let scrubWasPlaying=false;
function beginScrub(){ scrubWasPlaying=playing; if(playing){ playing=false; stopPlayInternal(); setPlayUI(false); } }
function seekTo(sec){ playheadSec=clampSecToContent(snapSecToChart(clampSecToContent(sec))); playAnchorSec=playheadSec; draw(); }
function endScrub(){ if(scrubWasPlaying && playheadSec<totalSec()-1e-6) startPlayFrom(playheadSec); scrubWasPlaying=false; }

/* ---- scrub lane: a dedicated playhead strip above the canvas (the ruler stays a scroll handle) ---- */
const scrub=document.getElementById('scrub'), sctx=scrub.getContext('2d');
function drawScrub(){
  const r=scrub.getBoundingClientRect();
  const w=Math.round(r.width*DPR), h=Math.round(r.height*DPR);
  if(scrub.width!==w||scrub.height!==h){ scrub.width=w; scrub.height=h; }
  sctx.setTransform(DPR,0,0,DPR,0,0);
  const W=scrub.clientWidth, H=scrub.clientHeight;
  sctx.fillStyle=col('--panel'); sctx.fillRect(0,0,W,H);
  // content extent on the global clock
  const x0=Math.max(GUT_L,secToX(0)), x1=Math.min(W,secToX(totalSec()));
  sctx.fillStyle=col('--note-bg'); sctx.fillRect(x0,4,Math.max(0,x1-x0),H-8);
  // region boundaries as faint ticks
  sctx.strokeStyle=col('--ink-faint'); sctx.lineWidth=1; let s=0;
  for(let i=0;i<regions.length-1;i++){ s+=regionSecLen(regions[i]); const bx=secToX(s);
    if(bx>=GUT_L&&bx<=W){ sctx.beginPath(); sctx.moveTo(Math.round(bx)+.5,4); sctx.lineTo(Math.round(bx)+.5,H-4); sctx.stroke(); } }

  if(px>=GUT_L-6&&px<=W+6){ sctx.fillStyle=col('--ember');
    sctx.beginPath(); sctx.moveTo(px-5,2); sctx.lineTo(px+5,2); sctx.lineTo(px,H-3); sctx.closePath(); sctx.fill(); }
  // left cap aligns with the pitch gutter and reads out the clock

  sctx.fillStyle=col('--ember'); sctx.font='10px '+col('--mono'); sctx.textBaseline='middle'; sctx.textAlign='left';
  sctx.fillText(clampSecToContent(playheadSec).toFixed(2)+'s', 8, H/2);
  sctx.strokeStyle=col('--ink-faint'); sctx.beginPath(); sctx.moveTo(0,H-.5); sctx.lineTo(W,H-.5); sctx.stroke();
}
let scrubDrag=false;
function scrubSec(e){ const rr=cv.getBoundingClientRect(); return xToSec(e.clientX-rr.left); }   // share the roll's x-frame
scrub.addEventListener('pointerdown',e=>{ scrub.setPointerCapture(e.pointerId); scrubDrag=true; beginScrub(); seekTo(scrubSec(e)); });

/* ============================================================
   TEMPO LANE  — the overlay editor for the bpm curve
   ------------------------------------------------------------
   A docked translucent panel over the lower roll. It shares the roll's x-frame
   (secToX/xToSec) so the curve always lines up with the notes above it; vertical
   is bpm, auto-fit and clamped. Points are stored region-local in m.tempo as
   {at(quarters), bpm, curve}; an absent array reads as one flat point at the
   ribbon bpm (today's behaviour). Dragging a point RE-TIMES (the integrator turns
   quarters into seconds, the extent follows). Chronological spans are drawn as a
   hatched "no tempo" gap and reject points (free time has no tempo). v1 keeps each
   point inside its own region; continuity across adjacent metered regions is
   already carried by the shared quarter axis of the run. */
const tempoPanel=document.getElementById('tempoPanel');
const tempoCv=document.getElementById('tempo'), tctx=tempoCv.getContext('2d');
const tempoHead=document.getElementById('tempoHead'), tempoGrip=document.getElementById('tempoGrip');
const tempoToggle=document.getElementById('tempoToggle'), tempoReadout=document.getElementById('tempoReadout');
const tempoCurveBtn=document.getElementById('tempoCurveBtn'), tempoDelBtn=document.getElementById('tempoDelBtn');
const tempoAffectBtn=document.getElementById('tempoAffectBtn');
const tempoEdit=document.getElementById('tempoEdit'), teLabel=document.getElementById('teLabel');
const teBefore=document.getElementById('teBefore'), teAfter=document.getElementById('teAfter'), teBpm=document.getElementById('teBpm');
const teBeforeWrap=document.getElementById('teBeforeWrap'), teBpmWrap=document.getElementById('teBpmWrap'), teAfterWrap=document.getElementById('teAfterWrap'), teAfterArrow=document.getElementById('teAfterArrow');
const CURVE_OPTS=[['linear','linear'],['exp','exp · in'],['log','log · out'],['smooth','smooth · S']];
function fillCurveSel(sel){ sel.innerHTML='<option value="">—</option>'+CURVE_OPTS.map(([v,t])=>`<option value="${v}">${t}</option>`).join(''); }
fillCurveSel(teBefore); fillCurveSel(teAfter);
let tempoSegSel=null;   // {a,b} when a SEGMENT (line) is grabbed — distinguishes it from a 2-point marquee
let tempoOpen=false;                 // collapsed by default — it's an opt-in surface
let tempoSel=new Set();              // Set of selected stored point refs (live refs into m.tempo)
let tempoMarq=null;                  // {sx,sy,x2,y2,band} while sweeping a selection
/* depositCurve declared once near the top — unified deposit brush across note + tempo */
let depositAffect='neither';           // when a deposit splits a line: which side adopts the deposit shape
const TEMPO_AFFECT_ORDER=['neither','after','before','both'];
const TEMPO_AFFECT_LABEL={neither:'⊘ keep', after:'▸ after', before:'◂ before', both:'◂▸ both'};
// after a point np is inserted into region m, set the surrounding segment shapes per the affect mode.
// a point's curve governs its OUTGOING segment, so np.curve is the C→B side and A.curve is the A→C side.
function applyAffectOnInsert(m, np){   // tempo wrapper: find predecessor A by time, then delegate to shared applyAffect
  let A=null; for(const p of (m.tempo||[])){ if(p===np) continue; if(p.at<np.at-1e-9 && (!A||p.at>A.at)) A=p; }
  const orig = A ? (A.curve||'linear') : depositCurve;

let tempoLo=60, tempoHi=180, tempoTopPad=12, tempoBotPad=14;   // current bpm window + vertical padding
const TEMPO_BPM_MIN=20, TEMPO_BPM_MAX=400, TEMPO_SPAN_MIN=30, TEMPO_HIT=8;

function bpmToY(bpm){ const H=tempoCv.clientHeight, top=tempoTopPad, bot=H-tempoBotPad;
  const f=(bpm-tempoLo)/Math.max(1e-6,tempoHi-tempoLo); return bot-(bot-top)*f; }
function yToBpm(y){ const H=tempoCv.clientHeight, top=tempoTopPad, bot=H-tempoBotPad;
  const f=(bot-y)/Math.max(1,bot-top); return tempoLo+f*(tempoHi-tempoLo); }
function tempoArr(m){ if(!Array.isArray(m.tempo)) m.tempo=[]; return m.tempo; }

/* the editable handle list for a metered region: stored points, plus an implicit
   coverage point at q=0 when the first stored point starts later (grabbing it
   materialises a real entry). */
function tempoHandlesFor(r){
  const m=mainSystem(r); if(m.kind==='chronological') return [];
  if(!(m.tempo&&m.tempo.length)) return [];          // empty region: just the borrowed flat line, no handle — a circle == a real point
  const Q=Q_OF(m), out=[];
  for(const p of m.tempo.slice().sort((a,b)=>a.at-b.at))

}
function tempoHandleSec(h){ return beatToSecIn(qToBeat(h.at,h.m), h.r); }

/* auto-fit the bpm window to everything currently on screen-ish (all metered
   segments + handles), clamped and floored to a readable span. */
function fitTempoRange(){
  if(tempoDrag) return;   // hold the window steady mid-drag so the point stays under the cursor
  let lo=Infinity, hi=-Infinity;
  for(const g of tmap().segs){ if(g.chrono) continue; lo=Math.min(lo,g.bpm0,g.bpm1); hi=Math.max(hi,g.bpm0,g.bpm1); }
  if(!isFinite(lo)){ lo=60; hi=180; }
  if(hi-lo<TEMPO_SPAN_MIN){ const mid=(lo+hi)/2; lo=mid-TEMPO_SPAN_MIN/2; hi=mid+TEMPO_SPAN_MIN/2; }
  const pad=(hi-lo)*0.12; lo-=pad; hi+=pad;
  tempoLo=Math.max(TEMPO_BPM_MIN, Math.floor(lo)); tempoHi=Math.min(TEMPO_BPM_MAX, Math.ceil(hi));
  if(tempoHi-tempoLo<TEMPO_SPAN_MIN) tempoHi=Math.min(TEMPO_BPM_MAX, tempoLo+TEMPO_SPAN_MIN);

function drawTempoGrid(W,H){
  // mirror the roll's per-region snap grid into the lane (same beatToX frame → exact alignment),
  // a touch fainter so it sits under the curve. only metered regions — free time is hatched instead.
  const lineAt=(x)=>{ tctx.beginPath(); tctx.moveTo(Math.round(x)+.5,0); tctx.lineTo(Math.round(x)+.5,H); tctx.stroke(); };
  for(const r of regions){ const m=mainSystem(r); if(m.kind==='chronological') continue;
    const s0=regionStartSec(r), len=regionSecLen(r), x0=secToX(s0), x1=secToX(s0+len); if(x1<GUT_L||x0>W) continue;
    _ctxRegion=r;

    tctx.beginPath(); tctx.rect(cx0,0,Math.max(0,cx1-cx0),H); tctx.clip();
    const g=regionBarGrid(r), bpb=g.bpb, barsN=Math.ceil((m.bars||settings.bars)-1e-9);   // SAME source as snap + roll grid
    const dense=(pxPerBeatIn(r)*bpb)/Math.max(1,g.phases.length) < 5;
    tctx.lineWidth=1;
    for(let bar=0; bar<barsN; bar++){
      for(const p of g.phases){ if(p.phase<=0) continue; if(dense && p.level>1) continue;
        tctx.strokeStyle = p.level>=2 ? 'rgba(40,82,76,0.05)' : 'rgba(40,82,76,0.11)';

      dragHist=histSnapshot(); startTempoMove([sg.a,sg.b], sg.r, x, y, sec); drawTempo(); return; }

  const sweptX=x1-x0, sweptY=y1-y0, band=M.band;
  if(band==='box'       && sweptX<3 && sweptY<3){ tempoSel.clear(); return; }
  if(band==='vertical'   && sweptX<3){ tempoSel.clear(); return; }
  if(band==='horizontal' && sweptY<3){ tempoSel.clear(); return; }
  tempoSel.clear();
  if(band==='region'){                                   // whole region(s) the sweep touches
    for(const reg of regions){ const m=mainSystem(reg); if(m.kind==='chronological'||!(m.tempo&&m.tempo.length)) continue;
      const rs=secToX(regionStartSec(reg)), re=secToX(regionStartSec(reg)+regionSecLen(reg));

    const inX=(band==='horizontal')||(h.x>=x0&&h.x<=x1), inY=(band==='vertical')||(h.y>=y0&&h.y<=y1);
